<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .stage-title { font-size: 11px; fill: #222; font-weight: 600; }
    .stage-sub { font-size: 9px; fill: #888; }
    .note { font-size: 9px; fill: #333; }
    .forbid { font-size: 9px; fill: #d84315; font-style: italic; }
    .graph-box { fill: #fafafa; stroke: #333; stroke-width: 1; }
    .stage-box { fill: #fff; stroke: #333; stroke-width: 1; }
    .sandbox { fill: #fff; stroke: #d84315; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .arrow { stroke: #555; stroke-width: 1; fill: none; marker-end: url(#a6); }
    .forbidden-arrow { stroke: #d84315; stroke-width: 1; fill: none; stroke-dasharray: 3 2; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .strike { stroke: #d84315; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="a6" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#555" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">P6. compute is sandboxed: extract, solve, rehydrate</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">the solver never holds a live reference to graph state during execution</text>

  <!-- Graph on left -->
  <rect x="40" y="90" width="140" height="180" rx="4" class="graph-box"/>
  <text class="stage-title" x="110" y="112" text-anchor="middle">graph</text>
  <text class="stage-sub" x="110" y="126" text-anchor="middle">shared state</text>
  <circle cx="80" cy="160" r="5" fill="#333"/>
  <circle cx="140" cy="155" r="5" fill="#333"/>
  <circle cx="100" cy="195" r="5" fill="#333"/>
  <circle cx="150" cy="210" r="5" fill="#333"/>
  <circle cx="75" cy="230" r="5" fill="#333"/>
  <line x1="80" y1="160" x2="140" y2="155" stroke="#666" stroke-width="0.75"/>
  <line x1="80" y1="160" x2="100" y2="195" stroke="#666" stroke-width="0.75"/>
  <line x1="140" y1="155" x2="150" y2="210" stroke="#666" stroke-width="0.75"/>
  <line x1="100" y1="195" x2="150" y2="210" stroke="#666" stroke-width="0.75"/>
  <line x1="100" y1="195" x2="75" y2="230" stroke="#666" stroke-width="0.75"/>

  <!-- extract -->
  <line x1="180" y1="150" x2="216" y2="150" class="arrow"/>
  <text class="stage-sub" x="198" y="142" text-anchor="middle">extract</text>

  <rect x="218" y="124" width="100" height="52" rx="3" class="stage-box"/>
  <text class="stage-title" x="268" y="144" text-anchor="middle">snapshot</text>
  <text class="stage-sub" x="268" y="158" text-anchor="middle">solver input</text>
  <text class="stage-sub" x="268" y="170" text-anchor="middle">(immutable)</text>

  <line x1="318" y1="150" x2="354" y2="150" class="arrow"/>

  <!-- Sandbox -->
  <rect x="356" y="100" width="180" height="130" rx="4" class="sandbox"/>
  <text class="stage-title" x="446" y="122" text-anchor="middle">compute sandbox</text>
  <text class="stage-sub" x="446" y="136" text-anchor="middle">isolated process</text>
  <line x1="372" y1="146" x2="520" y2="146" class="divider"/>
  <text class="note" x="372" y="166">• MIP solver</text>
  <text class="note" x="372" y="182">• or LLM inference</text>
  <text class="note" x="372" y="198">• or entity resolver</text>
  <text class="note" x="372" y="214">no graph handle</text>

  <line x1="536" y1="165" x2="572" y2="165" class="arrow"/>
  <text class="stage-sub" x="554" y="157" text-anchor="middle">rehydrate</text>

  <!-- Output box going back to graph -->
  <rect x="574" y="124" width="96" height="52" rx="3" class="stage-box"/>
  <text class="stage-title" x="622" y="144" text-anchor="middle">result</text>
  <text class="stage-sub" x="622" y="158" text-anchor="middle">via contract</text>
  <text class="stage-sub" x="622" y="170" text-anchor="middle">(P7)</text>

  <!-- Rehydrate back into graph -->
  <path d="M622,176 C622,250 180,250 180,220" class="arrow"/>

  <!-- Forbidden live link -->
  <path d="M175,130 C280,70 400,70 446,100" class="forbidden-arrow"/>
  <line x1="305" y1="78" x2="335" y2="108" class="strike"/>
  <text class="forbid" x="320" y="70" text-anchor="middle">no live reference</text>

  <line x1="40" y1="302" x2="660" y2="302" class="divider"/>
  <text class="caption" x="40" y="320">swap the solver without touching the graph, the ontology, or any layer below the adapter.</text>
</svg>
