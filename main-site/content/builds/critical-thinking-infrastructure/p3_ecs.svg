<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .col-title { font-size: 11px; fill: #222; font-weight: 600; }
    .col-sub { font-size: 9px; fill: #888; }
    .prop { font-size: 10px; fill: #333; }
    .method { font-size: 10px; fill: #d84315; }
    .ok { font-size: 10px; fill: #2e7d32; font-weight: 600; }
    .bad { font-size: 10px; fill: #d84315; font-weight: 600; }
    .good-box { fill: #fff; stroke: #333; stroke-width: 1; }
    .bad-box { fill: #fff; stroke: #d84315; stroke-width: 1; stroke-dasharray: 3 2; }
    .lane-box { fill: #fafafa; stroke: #333; stroke-width: 1; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .strike { stroke: #d84315; stroke-width: 1; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .label { font-size: 9px; fill: #888; }
  </style>

  <text class="title" x="350" y="22" text-anchor="middle">P3. data objects carry no behaviour (ECS)</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">pure data records on one side; mechanics, primitives and adapters on the other</text>

  <!-- ============ LEFT: forbidden ============ -->
  <rect x="40" y="60" width="300" height="260" rx="4" class="lane-box"/>
  <text class="col-title bad" x="60" y="82">forbidden: logic leaked into data</text>
  <text class="col-sub" x="60" y="95">every read triggers a side effect</text>

  <rect x="90" y="116" width="200" height="180" rx="3" class="bad-box"/>
  <text class="label" x="190" y="134" text-anchor="middle">VehicleNode</text>
  <line x1="100" y1="142" x2="280" y2="142" class="divider"/>

  <text class="prop" x="100" y="160">id: str</text>
  <text class="prop" x="100" y="176">capacity: int</text>
  <text class="prop" x="100" y="192">emission_class: str</text>

  <line x1="100" y1="202" x2="280" y2="202" class="divider"/>

  <text class="method" x="100" y="220">+ validate_capacity()</text>
  <line x1="100" y1="216" x2="250" y2="216" class="strike"/>
  <text class="method" x="100" y="238">+ compute_weight()</text>
  <line x1="100" y1="234" x2="246" y2="234" class="strike"/>
  <text class="method" x="100" y="256">+ on_read_persist()</text>
  <line x1="100" y1="252" x2="248" y2="252" class="strike"/>
  <text class="method" x="100" y="274">+ route_to(depot)</text>
  <line x1="100" y1="270" x2="234" y2="270" class="strike"/>

  <!-- ============ RIGHT: allowed ============ -->
  <rect x="360" y="60" width="300" height="260" rx="4" class="lane-box"/>
  <text class="col-title" x="380" y="82">allowed: pure data plus external systems</text>
  <text class="col-sub" x="380" y="95">instantiable, copyable, side-effect free</text>

  <rect x="410" y="116" width="200" height="100" rx="3" class="good-box"/>
  <text class="label" x="510" y="134" text-anchor="middle">Node (generic)</text>
  <line x1="420" y1="142" x2="600" y2="142" class="divider"/>
  <text class="prop" x="420" y="160">type: "Vehicle"</text>
  <text class="prop" x="420" y="176">properties: {...}</text>
  <text class="prop" x="420" y="192">valid_from / valid_to</text>
  <text class="ok" x="420" y="208">(no methods)</text>

  <text class="col-sub" x="380" y="238">behaviour lives outside:</text>
  <text class="prop" x="392" y="256">• mechanics: state transitions</text>
  <text class="prop" x="392" y="272">• primitives: spatial compute</text>
  <text class="prop" x="392" y="288">• compute adapters: solvers, inference</text>

  <line x1="40" y1="336" x2="660" y2="336" class="divider"/>
  <text class="caption" x="40" y="354">test: can a node be instantiated, copied, inspected without triggering any side effect?</text>
</svg>
