<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .lane-name { font-size: 11px; fill: #222; font-weight: 600; }
    .lane-sub { font-size: 9px; fill: #888; }
    .step { font-size: 9px; fill: #333; }
    .accent { fill: #d84315; font-weight: 600; }
    .lane-box { fill: #fafafa; stroke: #333; stroke-width: 1; }
    .iter-box { fill: #fff; stroke: #666; stroke-width: 0.75; }
    .iter-accent { fill: #fff; stroke: #d84315; stroke-width: 1; }
    .axis { stroke: #aaa; stroke-width: 0.75; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .arrow { stroke: #555; stroke-width: 1; fill: none; marker-end: url(#a1); }
    .tick { font-size: 8px; fill: #888; }
  </style>
  <defs>
    <marker id="a1" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#555" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">P1. the explore-decide loop is the unit of planning value</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">five iterations in twenty minutes beat two iterations over four weeks</text>

  <!-- time axis -->
  <text class="tick" x="54" y="72">time →</text>
  <line x1="90" y1="68" x2="660" y2="68" class="axis"/>

  <!-- ============ LANE 1: slow loop ============ -->
  <rect x="40" y="82" width="620" height="110" rx="4" class="lane-box"/>
  <text class="lane-name" x="54" y="102">slow loop</text>
  <text class="lane-sub" x="54" y="115">ttQ + ttA measured in days. commit early, explore little.</text>

  <rect x="180" y="134" width="120" height="36" rx="3" class="iter-box"/>
  <text class="step" x="240" y="149" text-anchor="middle">Q1 → A1</text>
  <text class="step" x="240" y="162" text-anchor="middle">(days)</text>

  <line x1="300" y1="152" x2="416" y2="152" class="arrow"/>

  <rect x="418" y="134" width="120" height="36" rx="3" class="iter-box"/>
  <text class="step" x="478" y="149" text-anchor="middle">Q2 → A2</text>
  <text class="step" x="478" y="162" text-anchor="middle">(days)</text>

  <text class="lane-sub" x="548" y="156">→ commit</text>

  <!-- ============ LANE 2: fast loop ============ -->
  <rect x="40" y="208" width="620" height="130" rx="4" class="lane-box"/>
  <text class="lane-name" x="54" y="228">fast loop</text>
  <text class="lane-sub" x="54" y="241">ttQ + ttA measured in seconds. each answer opens a better question.</text>

  <rect x="90" y="260" width="90" height="32" rx="3" class="iter-accent"/>
  <text class="step accent" x="135" y="280" text-anchor="middle">Q1 → A1</text>
  <line x1="180" y1="276" x2="194" y2="276" class="arrow"/>

  <rect x="196" y="260" width="90" height="32" rx="3" class="iter-accent"/>
  <text class="step accent" x="241" y="280" text-anchor="middle">Q2 → A2</text>
  <line x1="286" y1="276" x2="300" y2="276" class="arrow"/>

  <rect x="302" y="260" width="90" height="32" rx="3" class="iter-accent"/>
  <text class="step accent" x="347" y="280" text-anchor="middle">Q3 → A3</text>
  <line x1="392" y1="276" x2="406" y2="276" class="arrow"/>

  <rect x="408" y="260" width="90" height="32" rx="3" class="iter-accent"/>
  <text class="step accent" x="453" y="280" text-anchor="middle">Q4 → A4</text>
  <line x1="498" y1="276" x2="512" y2="276" class="arrow"/>

  <rect x="514" y="260" width="90" height="32" rx="3" class="iter-accent"/>
  <text class="step accent" x="559" y="280" text-anchor="middle">Q5 → A5</text>

  <text class="lane-sub" x="135" y="308">the scarce resource is the planner's</text>
  <text class="lane-sub" x="135" y="320">domain expertise, not compute</text>

  <line x1="40" y1="350" x2="660" y2="350" class="divider"/>
</svg>
