<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .node-title { font-size: 10px; fill: #222; font-weight: 600; }
    .prop { font-size: 9px; fill: #333; }
    .meta { font-size: 8px; fill: #888; }
    .accent { font-size: 9px; fill: #d84315; font-style: italic; }
    .node-box { fill: #fff; stroke: #333; stroke-width: 1; }
    .node-current { fill: #fff; stroke: #d84315; stroke-width: 1; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .arrow { stroke: #555; stroke-width: 1; fill: none; marker-end: url(#a5); }
    .supersedes { stroke: #d84315; stroke-width: 1; fill: none; stroke-dasharray: 3 2; marker-end: url(#a5r); }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .axis { stroke: #aaa; stroke-width: 0.75; }
    .tick-label { font-size: 8px; fill: #888; }
  </style>
  <defs>
    <marker id="a5" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#555" stroke-width="1" stroke-linejoin="round"/>
    </marker>
    <marker id="a5r" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#d84315" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">P5. corrections create new nodes, never overwrite</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">the full history of every entity stays queryable at any past timestamp</text>

  <!-- time axis -->
  <line x1="60" y1="282" x2="660" y2="282" class="axis"/>
  <text class="tick-label" x="60" y="300">2024-01</text>
  <text class="tick-label" x="260" y="300">2024-08</text>
  <text class="tick-label" x="460" y="300">2025-03</text>
  <text class="tick-label" x="640" y="300" text-anchor="end">now</text>
  <line x1="60" y1="278" x2="60" y2="286" class="axis"/>
  <line x1="260" y1="278" x2="260" y2="286" class="axis"/>
  <line x1="460" y1="278" x2="460" y2="286" class="axis"/>
  <line x1="640" y1="278" x2="640" y2="286" class="axis"/>

  <!-- v1 -->
  <rect x="60" y="90" width="170" height="110" rx="3" class="node-box"/>
  <text class="node-title" x="145" y="108" text-anchor="middle">Depot #D17 v1</text>
  <line x1="70" y1="116" x2="220" y2="116" class="divider"/>
  <text class="prop" x="70" y="134">addr: "12 Kallang Rd"</text>
  <text class="prop" x="70" y="150">capacity: 80</text>
  <text class="prop" x="70" y="166">lat/lon: (1.31, 103.86)</text>
  <line x1="70" y1="174" x2="220" y2="174" class="divider"/>
  <text class="meta" x="70" y="188">valid_from: 2024-01-03</text>
  <text class="meta" x="70" y="198">valid_to:   2024-08-14</text>

  <!-- v2 -->
  <rect x="260" y="90" width="170" height="110" rx="3" class="node-box"/>
  <text class="node-title" x="345" y="108" text-anchor="middle">Depot #D17 v2</text>
  <line x1="270" y1="116" x2="420" y2="116" class="divider"/>
  <text class="prop" x="270" y="134">addr: "12 Kallang Road"</text>
  <text class="prop" x="270" y="150">capacity: 80</text>
  <text class="prop" x="270" y="166">lat/lon: (1.31, 103.86)</text>
  <line x1="270" y1="174" x2="420" y2="174" class="divider"/>
  <text class="meta" x="270" y="188">valid_from: 2024-08-14</text>
  <text class="meta" x="270" y="198">valid_to:   2025-03-02</text>

  <!-- v3 (current) -->
  <rect x="460" y="90" width="180" height="110" rx="3" class="node-current"/>
  <text class="node-title" x="550" y="108" text-anchor="middle">Depot #D17 v3</text>
  <line x1="470" y1="116" x2="630" y2="116" class="divider"/>
  <text class="prop" x="470" y="134">addr: "12 Kallang Road"</text>
  <text class="prop" x="470" y="150">capacity: 120</text>
  <text class="prop" x="470" y="166">lat/lon: (1.31, 103.86)</text>
  <line x1="470" y1="174" x2="630" y2="174" class="divider"/>
  <text class="meta" x="470" y="188">valid_from: 2025-03-02</text>
  <text class="meta" x="470" y="198">valid_to:   (open)</text>

  <!-- supersedes arrows -->
  <path d="M230,228 L260,228" class="supersedes"/>
  <path d="M430,228 L460,228" class="supersedes"/>
  <text class="accent" x="245" y="245" text-anchor="middle">supersedes</text>
  <text class="accent" x="445" y="245" text-anchor="middle">supersedes</text>

  <line x1="40" y1="322" x2="660" y2="322" class="divider"/>
  <text class="caption" x="40" y="340">a scenario planned against v1 stays interpretable forever, because the inputs it referenced still exist.</text>
</svg>
