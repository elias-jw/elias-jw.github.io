<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .stakeholder { font-size: 10px; fill: #222; font-weight: 600; }
    .frame { font-size: 9px; fill: #888; font-style: italic; }
    .axis-label { font-size: 9px; fill: #888; }
    .axis-end { font-size: 9px; fill: #aaa; }
    .col-head { font-size: 9px; fill: #888; font-weight: 600; }
    .lens-track { fill: #f5f5f5; stroke: #ddd; stroke-width: 0.5; }
    .lens-accept { fill: #e8eef5; stroke: #6b8aaf; stroke-width: 0.75; }
    .agreed { fill: #fbe9e7; stroke: #d84315; stroke-width: 1; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .agreed-label { font-size: 10px; fill: #d84315; font-weight: 600; }
    .agreed-sub { font-size: 9px; fill: #d84315; font-style: italic; }
    .vline { stroke: #d84315; stroke-width: 0.75; stroke-dasharray: 3 2; }
  </style>

  <text class="title" x="350" y="22" text-anchor="middle">Five lenses, one decision space</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">a proposed restructuring of a manufacturer's supplier network in response to tariff risk</text>

  <!-- Column heads -->
  <text class="col-head" x="40" y="62">stakeholder</text>
  <text class="col-head" x="200" y="62">framing</text>
  <text class="col-head" x="380" y="62">acceptable region of the decision space</text>

  <line x1="40" y1="68" x2="660" y2="68" class="divider"/>

  <!-- Decision space x-axis labels (top of tracks) -->
  <text class="axis-end" x="380" y="86">option A</text>
  <text class="axis-end" x="660" y="86" text-anchor="end">option Z</text>

  <!-- ===== Agreed subset vertical band (drawn first, behind tracks) ===== -->
  <rect x="478" y="92" width="64" height="200" rx="2" class="agreed"/>

  <!-- ===== Row 1: operations ===== -->
  <text class="stakeholder" x="40" y="110">operations</text>
  <text class="frame" x="200" y="110">"lead-time and resilience"</text>
  <rect x="380" y="100" width="280" height="20" rx="2" class="lens-track"/>
  <rect x="430" y="100" width="200" height="20" rx="2" class="lens-accept"/>

  <!-- ===== Row 2: finance ===== -->
  <text class="stakeholder" x="40" y="148">finance</text>
  <text class="frame" x="200" y="148">"working capital and margin"</text>
  <rect x="380" y="138" width="280" height="20" rx="2" class="lens-track"/>
  <rect x="395" y="138" width="160" height="20" rx="2" class="lens-accept"/>

  <!-- ===== Row 3: workers ===== -->
  <text class="stakeholder" x="40" y="186">workers</text>
  <text class="frame" x="200" y="186">"jobs and transition"</text>
  <rect x="380" y="176" width="280" height="20" rx="2" class="lens-track"/>
  <rect x="450" y="176" width="180" height="20" rx="2" class="lens-accept"/>

  <!-- ===== Row 4: local communities ===== -->
  <text class="stakeholder" x="40" y="224">community</text>
  <text class="frame" x="200" y="224">"local economy and tax base"</text>
  <rect x="380" y="214" width="280" height="20" rx="2" class="lens-track"/>
  <rect x="478" y="214" width="160" height="20" rx="2" class="lens-accept"/>

  <!-- ===== Row 5: industry commentators ===== -->
  <text class="stakeholder" x="40" y="262">commentators</text>
  <text class="frame" x="200" y="262">"reshoring and policy"</text>
  <rect x="380" y="252" width="280" height="20" rx="2" class="lens-track"/>
  <rect x="408" y="252" width="170" height="20" rx="2" class="lens-accept"/>

  <!-- Vertical lines bracketing the agreed subset -->
  <line x1="478" y1="92" x2="478" y2="296" class="vline"/>
  <line x1="542" y1="92" x2="542" y2="296" class="vline"/>

  <!-- Agreed subset label -->
  <text class="agreed-label" x="510" y="312" text-anchor="middle">agreed subset</text>
  <text class="agreed-sub" x="510" y="324" text-anchor="middle">where all five lenses overlap</text>

  <!-- Footer caption -->
  <line x1="40" y1="346" x2="660" y2="346" class="divider"/>
  <text class="caption" x="40" y="364">the agreed subset is often larger than any single stakeholder expects.</text>
  <text class="sub-title" x="40" y="380">most disagreement is concentrated in the framing rather than in the facts; making the lenses explicit isolates the rest.</text>
</svg>
