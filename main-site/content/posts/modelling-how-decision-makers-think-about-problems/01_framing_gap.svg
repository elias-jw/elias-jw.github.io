<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .source { font-size: 11px; fill: #222; font-weight: 600; }
    .source-sub { font-size: 9px; fill: #888; }
    .reader { font-size: 11px; fill: #222; font-weight: 600; }
    .frame-label { font-size: 9px; fill: #d84315; font-style: italic; }
    .item { font-size: 10px; fill: #333; }
    .item-muted { font-size: 10px; fill: #aaa; }
    .order { font-size: 9px; fill: #888; }
    .source-box { fill: #fff; stroke: #333; stroke-width: 1; }
    .reader-box { fill: #fafafa; stroke: #333; stroke-width: 1; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .arrow { stroke: #333; stroke-width: 1; fill: none; marker-end: url(#a1); }
  </style>
  <defs>
    <marker id="a1" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">The same answer, three readers</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">analytical content unchanged; framing chosen by who is reading it</text>

  <!-- Source: analysis output -->
  <rect x="280" y="58" width="140" height="44" rx="3" class="source-box"/>
  <text class="source" x="350" y="78" text-anchor="middle">analysis output</text>
  <text class="source-sub" x="350" y="92" text-anchor="middle">scenarios, costs, risks</text>

  <!-- Diverging arrows to three readers -->
  <path d="M305,102 C250,130 180,150 135,168" class="arrow"/>
  <path d="M350,102 L350,168" class="arrow"/>
  <path d="M395,102 C450,130 520,150 565,168" class="arrow"/>

  <!-- ===== Reader A: finance first ===== -->
  <rect x="50" y="170" width="170" height="140" rx="4" class="reader-box"/>
  <text class="reader" x="135" y="190" text-anchor="middle">Reader A</text>
  <text class="frame-label" x="135" y="204" text-anchor="middle">"financial picture first"</text>
  <line x1="60" y1="214" x2="210" y2="214" class="divider"/>
  <text class="order" x="68" y="232">1.</text>
  <text class="item" x="84" y="232">cost impact</text>
  <text class="order" x="68" y="250">2.</text>
  <text class="item" x="84" y="250">margin sensitivity</text>
  <text class="order" x="68" y="268">3.</text>
  <text class="item-muted" x="84" y="268">coverage</text>
  <text class="order" x="68" y="286">4.</text>
  <text class="item-muted" x="84" y="286">map view</text>

  <!-- ===== Reader B: map first ===== -->
  <rect x="265" y="170" width="170" height="140" rx="4" class="reader-box"/>
  <text class="reader" x="350" y="190" text-anchor="middle">Reader B</text>
  <text class="frame-label" x="350" y="204" text-anchor="middle">"map before numbers"</text>
  <line x1="275" y1="214" x2="425" y2="214" class="divider"/>
  <text class="order" x="283" y="232">1.</text>
  <text class="item" x="299" y="232">map view</text>
  <text class="order" x="283" y="250">2.</text>
  <text class="item" x="299" y="250">spatial coverage</text>
  <text class="order" x="283" y="268">3.</text>
  <text class="item-muted" x="299" y="268">cost impact</text>
  <text class="order" x="283" y="286">4.</text>
  <text class="item-muted" x="299" y="286">margin sensitivity</text>

  <!-- ===== Reader C: tied to commitments ===== -->
  <rect x="480" y="170" width="170" height="140" rx="4" class="reader-box"/>
  <text class="reader" x="565" y="190" text-anchor="middle">Reader C</text>
  <text class="frame-label" x="565" y="204" text-anchor="middle">"tied to commitments"</text>
  <line x1="490" y1="214" x2="640" y2="214" class="divider"/>
  <text class="order" x="498" y="232">1.</text>
  <text class="item" x="514" y="232">contract impact</text>
  <text class="order" x="498" y="250">2.</text>
  <text class="item" x="514" y="250">public pledges</text>
  <text class="order" x="498" y="268">3.</text>
  <text class="item-muted" x="514" y="268">cost impact</text>
  <text class="order" x="498" y="286">4.</text>
  <text class="item-muted" x="514" y="286">map view</text>

  <!-- Footer caption -->
  <line x1="40" y1="324" x2="660" y2="324" class="divider"/>
  <text class="caption" x="40" y="342">a technically correct answer in the wrong frame is not a neutral act. it changes the decision.</text>
</svg>
