<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" font-family="'Fira Code', 'Courier New', monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#d84315" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="24" fill="#d84315" font-size="12" font-weight="500">the inspectable traces bridge</text>

  <!-- ============================================ -->
  <!-- TOP: Gut instinct path                       -->
  <!-- ============================================ -->

  <text x="40" y="56" fill="#555" font-size="10" font-weight="500">gut instinct path</text>

  <!-- Decision pipe -->
  <rect x="40" y="68" width="100" height="26" rx="3" fill="none" stroke="#555" stroke-width="0.5"/>
  <text x="90" y="85" fill="#444" font-size="9" text-anchor="middle">decision</text>
  <line x1="140" y1="81" x2="158" y2="81" stroke="#555" stroke-width="0.5" marker-end="url(#arr)"/>

  <rect x="160" y="68" width="100" height="26" rx="3" fill="none" stroke="#d84315" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="210" y="85" fill="#d84315" font-size="9" text-anchor="middle" font-weight="500">black box</text>
  <line x1="260" y1="81" x2="278" y2="81" stroke="#555" stroke-width="0.5" marker-end="url(#arr)"/>

  <rect x="280" y="68" width="100" height="26" rx="3" fill="none" stroke="#555" stroke-width="0.5"/>
  <text x="330" y="85" fill="#444" font-size="9" text-anchor="middle">outcome</text>

  <!-- Collective insight below -->
  <rect x="180" y="130" width="200" height="26" rx="3" fill="none" stroke="#555" stroke-width="0.5"/>
  <text x="280" y="147" fill="#444" font-size="9" text-anchor="middle">collective insight</text>

  <!-- Only outcome connects down -->
  <line x1="330" y1="94" x2="330" y2="128" stroke="#555" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- Black box does NOT connect - show the gap -->
  <line x1="210" y1="94" x2="210" y2="110" stroke="#d84315" stroke-width="0.5"/>
  <text x="214" y="108" fill="#d84315" font-size="7">no trace</text>
  <line x1="210" y1="112" x2="210" y2="120" stroke="#d84315" stroke-width="0.5" stroke-dasharray="2 2"/>

  <!-- Output from limited collective insight -->
  <line x1="280" y1="156" x2="280" y2="166" stroke="#555" stroke-width="0.5"/>
  <rect x="200" y="168" width="160" height="26" rx="3" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="280" y="185" fill="#555" font-size="8" text-anchor="middle">blind trust / distrust</text>

  <!-- Annotation -->
  <text x="400" y="85" fill="#555" font-size="8">outcome visible, reasoning invisible.</text>
  <text x="400" y="147" fill="#555" font-size="8">collective can see what happened,</text>
  <text x="400" y="159" fill="#555" font-size="8">but not why.</text>

  <!-- ============================================ -->
  <!-- Divider                                      -->
  <!-- ============================================ -->
  <line x1="40" y1="210" x2="700" y2="210" stroke="#555" stroke-width="0.3" stroke-dasharray="2 4"/>

  <!-- ============================================ -->
  <!-- BOTTOM: Grounded tools path                  -->
  <!-- ============================================ -->

  <text x="40" y="238" fill="#d84315" font-size="10" font-weight="500">grounded tools path</text>

  <!-- Decision pipe -->
  <rect x="40" y="254" width="100" height="26" rx="3" fill="none" stroke="#555" stroke-width="0.5"/>
  <text x="90" y="271" fill="#444" font-size="9" text-anchor="middle">decision</text>
  <line x1="140" y1="267" x2="158" y2="267" stroke="#555" stroke-width="0.5" marker-end="url(#arr)"/>

  <rect x="160" y="250" width="100" height="34" rx="3" fill="none" stroke="#d84315" stroke-width="0.5"/>
  <text x="210" y="265" fill="#d84315" font-size="9" text-anchor="middle" font-weight="500">inspectable</text>
  <text x="210" y="277" fill="#d84315" font-size="9" text-anchor="middle" font-weight="500">trace</text>
  <line x1="260" y1="267" x2="278" y2="267" stroke="#555" stroke-width="0.5" marker-end="url(#arr)"/>

  <rect x="280" y="254" width="100" height="26" rx="3" fill="none" stroke="#555" stroke-width="0.5"/>
  <text x="330" y="271" fill="#444" font-size="9" text-anchor="middle">outcome</text>

  <!-- Collective insight below -->
  <rect x="180" y="324" width="200" height="26" rx="3" fill="none" stroke="#d84315" stroke-width="0.5"/>
  <text x="280" y="341" fill="#d84315" font-size="9" text-anchor="middle" font-weight="500">collective insight</text>

  <!-- Both trace AND outcome connect down -->
  <line x1="210" y1="284" x2="210" y2="322" stroke="#d84315" stroke-width="0.5" marker-end="url(#arr-o)"/>
  <line x1="330" y1="280" x2="330" y2="322" stroke="#555" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- Labels on the connections -->
  <text x="214" y="306" fill="#d84315" font-size="7">why</text>
  <text x="334" y="306" fill="#555" font-size="7">what</text>

  <!-- Outcomes from collective insight -->
  <line x1="190" y1="350" x2="190" y2="366" stroke="#d84315" stroke-width="0.5"/>
  <line x1="280" y1="350" x2="280" y2="366" stroke="#d84315" stroke-width="0.5"/>
  <line x1="370" y1="350" x2="370" y2="366" stroke="#d84315" stroke-width="0.5"/>

  <rect x="140" y="368" width="80" height="26" rx="3" fill="none" stroke="#d84315" stroke-width="0.5"/>
  <text x="180" y="385" fill="#d84315" font-size="8" text-anchor="middle" font-weight="500">learning</text>

  <rect x="225" y="368" width="110" height="26" rx="3" fill="none" stroke="#d84315" stroke-width="0.5"/>
  <text x="280" y="385" fill="#d84315" font-size="8" text-anchor="middle" font-weight="500">accountability</text>

  <rect x="330" y="368" width="80" height="26" rx="3" fill="none" stroke="#d84315" stroke-width="0.5"/>
  <text x="370" y="385" fill="#d84315" font-size="8" text-anchor="middle" font-weight="500">trust</text>

  <!-- Annotation -->
  <text x="400" y="271" fill="#555" font-size="8">outcome visible, reasoning visible.</text>
  <text x="400" y="341" fill="#555" font-size="8">collective can see what happened</text>
  <text x="400" y="353" fill="#555" font-size="8">and why. can challenge, learn, build on it.</text>

  <!-- ============================================ -->
  <!-- Bottom summary                               -->
  <!-- ============================================ -->

  <text x="40" y="418" fill="#555" font-size="9">both decisions are fast. both are made by a few people in a room.</text>
  <text x="40" y="434" fill="#555" font-size="9">the difference is whether the process leaves something the rest of us can learn from.</text>

</svg>
