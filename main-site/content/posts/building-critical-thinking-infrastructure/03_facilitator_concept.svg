<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .regime { font-size: 11px; fill: #d84315; font-weight: 600; }
    .label { font-size: 10px; fill: #333; }
    .sub { font-size: 9px; fill: #888; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .box { stroke: #333; stroke-width: 1; fill: #fafafa; }
    .box-faded { stroke: #999; stroke-width: 1; fill: #fafafa; stroke-dasharray: 3 2; }
    .box-accent { stroke: #d84315; stroke-width: 1; fill: #fff; }
    .bar-bg { fill: #f0f0f0; }
    .bar-fill { fill: #d84315; opacity: 0.85; }
  </style>
  <defs>
    <marker id="afac" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">What sits inside the facilitator</text>

  <!-- ============ ROW 1: No facilitator ============ -->
  <text class="regime" x="16" y="60">1. No facilitator</text>
  <text class="sub" x="16" y="74">client tries it</text>
  <text class="sub" x="16" y="86">themselves</text>

  <rect x="170" y="50" width="80" height="32" rx="3" class="box"/>
  <text class="label" x="210" y="64" text-anchor="middle">"what if</text>
  <text class="label" x="210" y="76" text-anchor="middle">we lose X?"</text>

  <line x1="250" y1="66" x2="268" y2="66" stroke="#333" stroke-width="1" marker-end="url(#afac)"/>

  <rect x="270" y="50" width="180" height="32" rx="3" class="box-faded"/>
  <text class="label" x="360" y="64" text-anchor="middle">data wrangling,</text>
  <text class="label" x="360" y="76" text-anchor="middle">scripts, spreadsheets</text>

  <line x1="450" y1="66" x2="468" y2="66" stroke="#333" stroke-width="1" marker-end="url(#afac)"/>

  <rect x="470" y="50" width="80" height="32" rx="3" class="box-faded"/>
  <text class="label" x="510" y="70" text-anchor="middle">maybe?</text>

  <rect x="170" y="104" width="520" height="6" rx="2" class="bar-bg"/>
  <rect x="170" y="104" width="520" height="6" rx="2" class="bar-fill"/>
  <text class="caption" x="170" y="128">hours to days. often abandoned before the answer arrives.</text>

  <!-- ============ ROW 2: Human facilitator ============ -->
  <text class="regime" x="16" y="172">2. Human facilitator</text>
  <text class="sub" x="16" y="186">someone who</text>
  <text class="sub" x="16" y="198">knows the system</text>

  <rect x="170" y="162" width="80" height="32" rx="3" class="box"/>
  <text class="label" x="210" y="176" text-anchor="middle">"what if</text>
  <text class="label" x="210" y="188" text-anchor="middle">we lose X?"</text>

  <line x1="250" y1="178" x2="268" y2="178" stroke="#333" stroke-width="1" marker-end="url(#afac)"/>

  <rect x="270" y="162" width="120" height="32" rx="3" class="box"/>
  <text class="label" x="330" y="176" text-anchor="middle">human</text>
  <text class="label" x="330" y="188" text-anchor="middle">translates</text>

  <line x1="330" y1="194" x2="330" y2="208" stroke="#888" stroke-width="0.75"/>
  <rect x="300" y="208" width="60" height="22" rx="2" fill="#fff" stroke="#888" stroke-width="0.75"/>
  <text class="sub" x="330" y="222" text-anchor="middle" fill="#666">ontology</text>

  <line x1="390" y1="178" x2="408" y2="178" stroke="#333" stroke-width="1" marker-end="url(#afac)"/>

  <rect x="410" y="162" width="100" height="32" rx="3" class="box"/>
  <text class="label" x="460" y="176" text-anchor="middle">formal</text>
  <text class="label" x="460" y="188" text-anchor="middle">query</text>

  <line x1="510" y1="178" x2="528" y2="178" stroke="#333" stroke-width="1" marker-end="url(#afac)"/>

  <rect x="530" y="162" width="80" height="32" rx="3" class="box"/>
  <text class="label" x="570" y="182" text-anchor="middle">answer</text>

  <rect x="170" y="248" width="520" height="6" rx="2" class="bar-bg"/>
  <rect x="170" y="248" width="170" height="6" rx="2" class="bar-fill"/>
  <text class="caption" x="170" y="272">seconds to minutes. bounded by one person's bandwidth.</text>

  <!-- ============ ROW 3: AI facilitator ============ -->
  <text class="regime" x="16" y="314">3. AI facilitator</text>
  <text class="sub" x="16" y="328">research target</text>

  <rect x="170" y="304" width="80" height="32" rx="3" class="box"/>
  <text class="label" x="210" y="318" text-anchor="middle">"what if</text>
  <text class="label" x="210" y="330" text-anchor="middle">we lose X?"</text>

  <line x1="250" y1="320" x2="268" y2="320" stroke="#333" stroke-width="1" marker-end="url(#afac)"/>

  <rect x="270" y="304" width="120" height="32" rx="3" class="box-accent"/>
  <text class="label" x="330" y="318" text-anchor="middle" fill="#d84315">AI</text>
  <text class="label" x="330" y="330" text-anchor="middle" fill="#d84315">translates</text>

  <line x1="330" y1="336" x2="330" y2="350" stroke="#888" stroke-width="0.75"/>
  <rect x="300" y="350" width="60" height="22" rx="2" fill="#fff" stroke="#888" stroke-width="0.75"/>
  <text class="sub" x="330" y="364" text-anchor="middle" fill="#666">ontology</text>

  <line x1="390" y1="320" x2="408" y2="320" stroke="#333" stroke-width="1" marker-end="url(#afac)"/>

  <rect x="410" y="304" width="100" height="32" rx="3" class="box"/>
  <text class="label" x="460" y="318" text-anchor="middle">formal</text>
  <text class="label" x="460" y="330" text-anchor="middle">query</text>

  <line x1="510" y1="320" x2="528" y2="320" stroke="#333" stroke-width="1" marker-end="url(#afac)"/>

  <rect x="530" y="304" width="80" height="32" rx="3" class="box"/>
  <text class="label" x="570" y="324" text-anchor="middle">answer</text>

  <line x1="570" y1="336" x2="570" y2="350" stroke="#d84315" stroke-width="0.75"/>
  <rect x="530" y="350" width="80" height="22" rx="2" fill="#fff" stroke="#d84315" stroke-width="0.75"/>
  <text class="sub" x="570" y="364" text-anchor="middle" fill="#d84315">+ trace</text>

  <rect x="170" y="394" width="520" height="6" rx="2" class="bar-bg"/>
  <rect x="170" y="394" width="40" height="6" rx="2" class="bar-fill"/>
  <text class="caption" x="170" y="418">near zero. the trace falls out as a structural by-product.</text>

</svg>
