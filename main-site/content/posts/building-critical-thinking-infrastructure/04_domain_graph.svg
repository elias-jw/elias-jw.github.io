  <rect x="356" y="150" width="12" height="12" rx="1" fill="#1565c0" stroke="#0d47a1" stroke-width="0.75"/>
  <rect x="354" y="148" width="16" height="16" rx="2" fill="none" stroke="#1565c0" stroke-width="0.5" opacity="0.4"/>

