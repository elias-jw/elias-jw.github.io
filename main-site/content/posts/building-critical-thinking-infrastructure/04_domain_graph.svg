    <circle cx="12" cy="42" r="3.5" fill="#64b5f6" opacity="0.7"/>
    <text class="src" x="22" y="44">Demand (existing)</text>

    <circle cx="12" cy="58" r="3.5" fill="#ff8a65" opacity="0.8"/>
