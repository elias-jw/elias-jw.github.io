  <!-- ===== BOTTOM ===== -->
  <text class="sub" x="300" y="344" text-anchor="middle">Same spatial foundation. Different operational question each time.</text>
  <text class="sub" x="300" y="362" text-anchor="middle" style="fill:#d84315;">Scenario B is an overlay: it shares the base graph and stores only the difference.</text>
