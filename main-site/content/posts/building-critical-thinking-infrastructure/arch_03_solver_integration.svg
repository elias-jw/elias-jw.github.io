<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .label { font-size: 10px; fill: #333; }
    .label-accent { font-size: 10px; fill: #d84315; font-weight: 600; }
    .sub { font-size: 9px; fill: #888; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .box { stroke: #333; stroke-width: 1; fill: #fafafa; }
    .box-accent { stroke: #d84315; stroke-width: 1; fill: #fff; }
    .graph-bar { stroke: #333; stroke-width: 1; fill: #f0f0f0; }
  </style>
  <defs>
    <marker id="aada" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round"/>
    </marker>
    <marker id="aada-o" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#d84315" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">The adapter pattern</text>

  <!-- Graph bar -->
  <rect x="80" y="50" width="540" height="50" rx="4" class="graph-bar"/>
  <text class="label" x="350" y="74" text-anchor="middle" font-weight="600">GRAPH</text>
  <text class="sub" x="350" y="88" text-anchor="middle">shared, ontology-structured</text>

  <!-- Read arrow: graph to extract -->
  <line x1="200" y1="100" x2="200" y2="148" stroke="#333" stroke-width="1" marker-end="url(#aada)"/>
  <text class="sub" x="208" y="128">read</text>

  <!-- Write arrow: write back to graph -->
  <line x1="520" y1="150" x2="520" y2="102" stroke="#d84315" stroke-width="1" marker-end="url(#aada-o)"/>
  <text class="caption" x="528" y="128">write</text>

  <!-- Pipeline: extract -> run -> write -->
  <rect x="140" y="150" width="120" height="50" rx="3" class="box"/>
  <text class="label" x="200" y="172" text-anchor="middle">extract</text>
  <text class="sub" x="200" y="186" text-anchor="middle">subgraph</text>

  <line x1="260" y1="175" x2="298" y2="175" stroke="#333" stroke-width="1" marker-end="url(#aada)"/>

  <rect x="300" y="150" width="120" height="50" rx="3" class="box"/>
  <text class="label" x="360" y="172" text-anchor="middle">run solver</text>
  <text class="sub" x="360" y="186" text-anchor="middle">in isolation</text>

  <line x1="420" y1="175" x2="458" y2="175" stroke="#333" stroke-width="1" marker-end="url(#aada)"/>

  <rect x="460" y="150" width="120" height="50" rx="3" class="box-accent"/>
  <text class="label-accent" x="520" y="172" text-anchor="middle">write back</text>
  <text class="caption" x="520" y="186" text-anchor="middle">+ contract</text>

  <!-- Contract callout below write box -->
  <line x1="520" y1="200" x2="520" y2="218" stroke="#888" stroke-width="0.5"/>
  <text class="sub" x="520" y="232" text-anchor="middle" fill="#666">contract: preconditions, output spec,</text>
  <text class="sub" x="520" y="244" text-anchor="middle" fill="#666">ontology conformance, idempotency, scope</text>

  <!-- Bottom annotations -->
  <text class="caption" x="350" y="278" text-anchor="middle">one adapter per method type, built once and reused</text>
  <text class="sub" x="350" y="294" text-anchor="middle">facility location · fleet sizing · scenario comparison · cost projection · ...</text>
  <text class="sub" x="350" y="308" text-anchor="middle">Same interface every time, so the output of one method becomes input to the next.</text>
</svg>
