<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Wardley map of the Logistics Planning Decision Support Platform</title>
  <desc>A Wardley map of the four-layer logistics planning platform showing fifteen components positioned on axes of visibility and evolution. Components are coloured by sourcing: purple for custom build, teal for open source and UK academic, amber for commercial product, and gray for UK public data and utility. The map highlights the UK public-data commodity anchor, HiGHS as a UK academic open source asset, and deliberate inertia on the custom Rust graph engine.</desc>

  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888780"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3C3489"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#085041"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#633806"/>
    </marker>
    <marker id="arrow-dep" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bdbbb2"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>

  <!-- Title block -->
  <text x="60" y="48" font-size="24" font-weight="600" fill="#2C2C2A">Logistics planning decision support platform — Wardley map</text>
  <text x="60" y="74" font-size="14" fill="#5F5E5A">Sourcing lens: UK government, UK academic, open source, commercial. Dated 2026-04-08.</text>

  <!-- Plot area -->
  <rect x="120" y="120" width="1220" height="680" fill="#fafaf7" stroke="#d3d1c7" stroke-width="1"/>

  <!-- Stage dividers -->
  <line x1="425" y1="120" x2="425" y2="800" stroke="#d3d1c7" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="730" y1="120" x2="730" y2="800" stroke="#d3d1c7" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="1035" y1="120" x2="1035" y2="800" stroke="#d3d1c7" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Stage labels (bottom) -->
  <text x="272" y="828" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Genesis</text>
  <text x="577" y="828" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Custom-built</text>
  <text x="882" y="828" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Product</text>
  <text x="1187" y="828" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Commodity</text>
  <text x="272" y="846" text-anchor="middle" font-size="11" fill="#888780">Novel, uncertain</text>
  <text x="577" y="846" text-anchor="middle" font-size="11" fill="#888780">Bespoke, differentiating</text>
  <text x="882" y="846" text-anchor="middle" font-size="11" fill="#888780">Multiple vendors, feature-competitive</text>
  <text x="1187" y="846" text-anchor="middle" font-size="11" fill="#888780">Utility, ubiquitous</text>
  <text x="730" y="878" text-anchor="middle" font-size="13" font-style="italic" fill="#5F5E5A">Evolution  →</text>

  <!-- Visibility axis -->
  <text x="90" y="132" text-anchor="end" font-size="13" font-weight="500" fill="#444441">Visible</text>
  <text x="90" y="148" text-anchor="end" font-size="11" fill="#888780">(to user)</text>
  <text x="90" y="798" text-anchor="end" font-size="13" font-weight="500" fill="#444441">Hidden</text>
  <text x="60" y="460" text-anchor="middle" font-size="13" font-style="italic" fill="#5F5E5A" transform="rotate(-90 60 460)">Value chain  ↑</text>

  <!-- ============================================= -->
  <!-- Dependencies (drawn first, underneath nodes)   -->
  <!-- ============================================= -->
  <g stroke="#bdbbb2" stroke-width="0.75" fill="none" opacity="0.85">
    <!-- User need → Inspectable traces, AI facilitator -->
    <line x1="157" y1="140" x2="266" y2="222"/>
    <line x1="157" y1="140" x2="291" y2="270"/>
    <!-- Inspectable traces → Graph engine, Rehydration -->
    <line x1="266" y1="222" x2="632" y2="596"/>
    <line x1="266" y1="222" x2="584" y2="542"/>
    <!-- AI facilitator → Micro-tools, Domain ontology, LLMs -->
    <line x1="291" y1="270" x2="523" y2="351"/>
    <line x1="291" y1="270" x2="486" y2="419"/>
    <line x1="291" y1="270" x2="913" y2="297"/>
    <!-- Micro-tools → Domain ontology, Spatial KG, Rehydration -->
    <line x1="523" y1="351" x2="486" y2="419"/>
    <line x1="523" y1="351" x2="535" y2="487"/>
    <line x1="523" y1="351" x2="584" y2="542"/>
    <!-- Domain ontology → Graph engine -->
    <line x1="486" y1="419" x2="632" y2="596"/>
    <!-- Spatial KG → Graph engine, Entity resolution, H3, UK public data -->
    <line x1="535" y1="487" x2="632" y2="596"/>
    <line x1="535" y1="487" x2="754" y2="650"/>
    <line x1="535" y1="487" x2="1194" y2="718"/>
    <line x1="535" y1="487" x2="1230" y2="759"/>
    <!-- Rehydration → Graph engine, HiGHS -->
    <line x1="584" y1="542" x2="632" y2="596"/>
    <line x1="584" y1="542" x2="1096" y2="678"/>
    <!-- Graph engine → Cloud compute -->
    <line x1="632" y1="596" x2="1255" y2="780"/>
    <!-- LLMs → Cloud compute -->
    <line x1="913" y1="297" x2="1255" y2="780"/>
  </g>

  <!-- ============================================= -->
  <!-- Movement arrows (on/near each node)            -->
  <!-- ============================================= -->
  <g fill="none" stroke-width="2">
    <!-- AI facilitator: accelerating (double arrow) -->
    <line x1="305" y1="270" x2="350" y2="270" stroke="#3C3489" marker-end="url(#arrow-purple)"/>
    <line x1="305" y1="278" x2="345" y2="278" stroke="#3C3489" stroke-width="1.5"/>
    <!-- Inspectable traces: evolving -->
    <line x1="280" y1="222" x2="320" y2="222" stroke="#3C3489" marker-end="url(#arrow-purple)"/>
    <!-- Micro-tools: evolving -->
    <line x1="537" y1="351" x2="577" y2="351" stroke="#3C3489" marker-end="url(#arrow-purple)"/>
    <!-- Domain ontology: evolving -->
    <line x1="500" y1="419" x2="540" y2="419" stroke="#3C3489" marker-end="url(#arrow-purple)"/>
    <!-- Spatial KG: evolving -->
    <line x1="549" y1="487" x2="589" y2="487" stroke="#3C3489" marker-end="url(#arrow-purple)"/>
    <!-- Rehydration: evolving -->
    <line x1="598" y1="542" x2="638" y2="542" stroke="#3C3489" marker-end="url(#arrow-purple)"/>
    <!-- LLMs: accelerating -->
    <line x1="927" y1="297" x2="985" y2="297" stroke="#633806" marker-end="url(#arrow-amber)"/>
    <line x1="927" y1="305" x2="980" y2="305" stroke="#633806" stroke-width="1.5"/>
    <!-- HiGHS / OR-Tools: accelerating -->
    <line x1="1110" y1="678" x2="1170" y2="678" stroke="#085041" marker-end="url(#arrow-teal)"/>
    <line x1="1110" y1="686" x2="1165" y2="686" stroke="#085041" stroke-width="1.5"/>
    <!-- UK public data: slow evolution (shorter arrow) -->
    <line x1="1244" y1="759" x2="1270" y2="759" stroke="#444441" marker-end="url(#arrow-gray)" stroke-width="1.5"/>
  </g>

  <!-- Inertia marker on Graph engine (above the node) -->
  <g stroke="#A32D2D" stroke-width="2.5" stroke-linecap="round">
    <line x1="625" y1="572" x2="639" y2="586"/>
    <line x1="639" y1="572" x2="625" y2="586"/>
  </g>

  <!-- ============================================= -->
  <!-- Nodes and labels                               -->
  <!-- ============================================= -->

  <!-- 1. User need (coral anchor) -->
  <g>
    <circle cx="157" cy="140" r="10" fill="#D85A30" stroke="#712B13" stroke-width="1.5"/>
    <text x="173" y="136" font-size="14" font-weight="600" fill="#2C2C2A">User need</text>
    <text x="173" y="152" font-size="12" fill="#5F5E5A">Fast, grounded, inspectable answers</text>
    <text x="173" y="166" font-size="12" fill="#5F5E5A">within the decision validity window</text>
  </g>

  <!-- 2. Inspectable traces (purple) -->
  <g>
    <circle cx="266" cy="222" r="8" fill="#7F77DD" stroke="#3C3489" stroke-width="1.5"/>
    <text x="331" y="218" font-size="13" font-weight="500" fill="#2C2C2A">Inspectable traces</text>
    <text x="331" y="232" font-size="11" fill="#5F5E5A">For collective accountability</text>
  </g>

  <!-- 3. AI facilitator (purple, accelerating) -->
  <g>
    <circle cx="291" cy="270" r="8" fill="#7F77DD" stroke="#3C3489" stroke-width="1.5"/>
    <text x="361" y="266" font-size="13" font-weight="500" fill="#2C2C2A">AI facilitator</text>
    <text x="361" y="280" font-size="11" fill="#5F5E5A">Natural language → graph queries</text>
  </g>

  <!-- 4. Micro-tools (purple) -->
  <g>
    <circle cx="523" cy="351" r="8" fill="#7F77DD" stroke="#3C3489" stroke-width="1.5"/>
    <text x="588" y="347" font-size="13" font-weight="500" fill="#2C2C2A">Micro-tools layer</text>
    <text x="588" y="361" font-size="11" fill="#5F5E5A">Scenario compare, ingest, explore</text>
  </g>

  <!-- 5. Domain ontology (purple) -->
  <g>
    <circle cx="486" cy="419" r="8" fill="#7F77DD" stroke="#3C3489" stroke-width="1.5"/>
    <text x="551" y="415" font-size="13" font-weight="500" fill="#2C2C2A">Domain ontology framework</text>
    <text x="551" y="429" font-size="11" fill="#5F5E5A">Declarative, runtime-loaded (P4)</text>
  </g>

  <!-- 6. Spatial knowledge graph (purple) -->
  <g>
    <circle cx="535" cy="487" r="8" fill="#7F77DD" stroke="#3C3489" stroke-width="1.5"/>
    <text x="600" y="483" font-size="13" font-weight="500" fill="#2C2C2A">Spatial knowledge graph</text>
    <text x="600" y="497" font-size="11" fill="#5F5E5A">Per-geography integrated product</text>
  </g>

  <!-- 7. Rehydration contracts (purple) -->
  <g>
    <circle cx="584" cy="542" r="8" fill="#7F77DD" stroke="#3C3489" stroke-width="1.5"/>
    <text x="649" y="538" font-size="13" font-weight="500" fill="#2C2C2A">Rehydration contracts</text>
    <text x="649" y="552" font-size="11" fill="#5F5E5A">Solver adapters (P6, P7)</text>
  </g>

  <!-- 8. Graph engine (purple with × inertia) -->
  <g>
    <circle cx="632" cy="596" r="8" fill="#7F77DD" stroke="#3C3489" stroke-width="1.5"/>
    <text x="648" y="600" font-size="13" font-weight="500" fill="#2C2C2A">Graph engine · Rust · ECS · bitemporal</text>
    <text x="648" y="614" font-size="11" fill="#A32D2D">× deliberate inertia — preserves P3 / P5 / P7 structurally</text>
  </g>

  <!-- 9. LLMs (amber, accelerating) -->
  <g>
    <circle cx="913" cy="297" r="8" fill="#EF9F27" stroke="#633806" stroke-width="1.5"/>
    <text x="1000" y="293" font-size="13" font-weight="500" fill="#2C2C2A">LLMs (frontier + open-weight)</text>
    <text x="1000" y="307" font-size="11" fill="#5F5E5A">Claude, GPT, Gemini · Llama, Mistral, Qwen</text>
  </g>



  <!-- 11. Entity resolution (teal) -->
  <g>
    <circle cx="754" cy="650" r="8" fill="#1D9E75" stroke="#085041" stroke-width="1.5"/>
    <text x="740" y="646" text-anchor="end" font-size="13" font-weight="500" fill="#2C2C2A">Entity resolution / geocoding</text>
    <text x="740" y="660" text-anchor="end" font-size="11" fill="#5F5E5A">UK · UPRN · PAF · VOA · CH</text>
  </g>

  <!-- 12. HiGHS / OR-Tools (teal, accelerating) -->
  <g>
    <circle cx="1096" cy="678" r="8" fill="#1D9E75" stroke="#085041" stroke-width="1.5"/>
    <text x="1082" y="652" text-anchor="end" font-size="13" font-weight="500" fill="#2C2C2A">Open source solvers</text>
    <text x="1082" y="666" text-anchor="end" font-size="11" fill="#085041">HiGHS (U. Edinburgh) · OR-Tools</text>
  </g>

  <!-- 13. H3 spatial index (teal) -->
  <g>
    <circle cx="1194" cy="718" r="8" fill="#1D9E75" stroke="#085041" stroke-width="1.5"/>
    <text x="1180" y="714" text-anchor="end" font-size="13" font-weight="500" fill="#2C2C2A">H3 spatial index</text>
    <text x="1180" y="728" text-anchor="end" font-size="11" fill="#5F5E5A">Hierarchical hexagons (h3o Rust crate)</text>
  </g>

  <!-- 14. UK public data (gray) -->
  <g>
    <circle cx="1230" cy="759" r="9" fill="#888780" stroke="#2C2C2A" stroke-width="1.5"/>
    <text x="1215" y="755" text-anchor="end" font-size="13" font-weight="600" fill="#2C2C2A">UK public data</text>
    <text x="1215" y="769" text-anchor="end" font-size="11" fill="#5F5E5A">OS · ONS · Land Registry · VOA · Companies House · DEFRA · DfT</text>
  </g>

  <!-- 15. Cloud compute (gray) -->
  <g>
    <circle cx="1255" cy="780" r="8" fill="#888780" stroke="#2C2C2A" stroke-width="1.5"/>
    <text x="1240" y="794" text-anchor="end" font-size="12" fill="#5F5E5A">Cloud compute (UK sovereign default)</text>
  </g>

  <!-- ============================================= -->
  <!-- Legend                                         -->
  <!-- ============================================= -->
  <g>
    <rect x="900" y="130" width="430" height="142" fill="#ffffff" stroke="#d3d1c7" stroke-width="1" rx="6"/>
    <text x="914" y="152" font-size="13" font-weight="600" fill="#2C2C2A">Sourcing</text>

    <circle cx="924" cy="172" r="6" fill="#7F77DD" stroke="#3C3489" stroke-width="1.2"/>
    <text x="938" y="176" font-size="11" fill="#444441">Custom build (platform investment)</text>

    <circle cx="924" cy="192" r="6" fill="#1D9E75" stroke="#085041" stroke-width="1.2"/>
    <text x="938" y="196" font-size="11" fill="#444441">Open source / UK academic</text>

    <circle cx="924" cy="212" r="6" fill="#EF9F27" stroke="#633806" stroke-width="1.2"/>
    <text x="938" y="216" font-size="11" fill="#444441">Commercial product (consumed, pluggable)</text>

    <circle cx="924" cy="232" r="6" fill="#888780" stroke="#2C2C2A" stroke-width="1.2"/>
    <text x="938" y="236" font-size="11" fill="#444441">UK public data / utility</text>

    <circle cx="924" cy="252" r="6" fill="#D85A30" stroke="#712B13" stroke-width="1.2"/>
    <text x="938" y="256" font-size="11" fill="#444441">Anchor (user need)</text>

    <text x="1140" y="152" font-size="13" font-weight="600" fill="#2C2C2A">Movement</text>

    <line x1="1148" y1="170" x2="1178" y2="170" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
    <text x="1186" y="174" font-size="11" fill="#444441">Natural evolution</text>

    <line x1="1148" y1="190" x2="1178" y2="190" stroke="#444441" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <line x1="1148" y1="198" x2="1174" y2="198" stroke="#444441" stroke-width="1.5"/>
    <text x="1186" y="194" font-size="11" fill="#444441">Accelerating</text>

    <g stroke="#A32D2D" stroke-width="2" stroke-linecap="round">
      <line x1="1152" y1="213" x2="1168" y2="229"/>
      <line x1="1168" y1="213" x2="1152" y2="229"/>
    </g>
    <text x="1186" y="225" font-size="11" fill="#444441">Deliberate inertia</text>

    <line x1="1148" y1="248" x2="1180" y2="248" stroke="#bdbbb2" stroke-width="0.75"/>
    <text x="1186" y="252" font-size="11" fill="#444441">Dependency</text>
  </g>

  <!-- Footer note -->
  <text x="60" y="890" font-size="11" fill="#888780">Position is market evolution, not internal maturity. Commodity tier carries UK public data and UK academic open source — the strategic anchor of the map. Custom tier is where P1–P9 become structural guarantees.</text>
</svg>
