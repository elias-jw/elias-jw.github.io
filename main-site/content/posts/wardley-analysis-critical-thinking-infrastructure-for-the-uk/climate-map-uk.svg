    <text x="335" y="633" text-anchor="middle" font-size="9" fill="#047857" font-style="italic">OS · ONS · LR · VOA · CH · DfT</text>
  </g>

  <!-- PLAY 6: HiGHS-first solver tier -->
  <g>
    <path d="M 960 660 L 1040 650" stroke="#0E7490" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="790" y="640" width="170" height="42" fill="#ECFEFF" stroke="#0E7490" stroke-width="1.5" rx="5"/>
    <text x="875" y="658" text-anchor="middle" font-size="11" font-weight="700" fill="#0E7490">⑥ HiGHS-FIRST TIER</text>
    <text x="875" y="673" text-anchor="middle" font-size="9" fill="#155E75" font-style="italic">default open solver, U. Edinburgh</text>
