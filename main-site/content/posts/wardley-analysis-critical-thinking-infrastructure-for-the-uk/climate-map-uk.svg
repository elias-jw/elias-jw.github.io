  <g opacity="0.85">
    <path d="M 340 820 L 340 220" fill="none" stroke="#B45309" stroke-width="4" marker-end="url(#arrowMandate)"/>
    <rect x="190" y="845" width="300" height="40" fill="#FFFBEB" stroke="#B45309" stroke-width="1" rx="4"/>
    <text x="340" y="862" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">UK TRANSPARENCY MANDATE</text>
    <text x="340" y="877" text-anchor="middle" font-size="10" fill="#92400E" font-style="italic">ATRS · AI Playbook for Government · Data Ethics Framework</text>
  </g>

  <!-- KEY COMPONENTS -->

  <!-- Anchor -->
  <g transform="translate(640, 108)">
    <polygon points="0,-14 4,-4 14,-4 6,3 9,14 0,7 -9,14 -6,3 -14,-4 -4,-4" fill="#991B1B" stroke="#450A0A" stroke-width="1.5"/>
  </g>
  <text x="660" y="100" font-size="12" font-weight="700" fill="#450A0A">Decision within validity window</text>

  <!-- Inspectable trace -->
  <circle cx="529.5" cy="173" r="9" fill="#1E40AF" stroke="white" stroke-width="2"/>
  <text x="544" y="170" font-size="12" font-weight="600" fill="#111827">Inspectable trace</text>

  <!-- AI facilitator -->
  <circle cx="414.5" cy="265" r="11" fill="#7B2CBF" stroke="white" stroke-width="2"/>
  <text x="430" y="262" font-size="12" font-weight="700" fill="#111827">AI facilitator</text>
  <text x="430" y="277" font-size="10" fill="#7B2CBF" font-style="italic">research bet</text>

  <!-- Ontology framework -->
  <circle cx="610" cy="417" r="9" fill="#1E40AF" stroke="#047857" stroke-width="2.5"/>
  <text x="625" y="414" font-size="12" font-weight="600" fill="#111827">Ontology framework</text>

  <!-- Spatial KG — the public good centrepiece -->
  <circle cx="644.5" cy="555" r="26" fill="#D1FAE5" stroke="#047857" stroke-width="2" stroke-dasharray="4,3" opacity="0.9"/>
  <circle cx="644.5" cy="555" r="13" fill="#10B981" stroke="#064E3B" stroke-width="2.5"/>
  <text x="670" y="550" font-size="14" font-weight="700" fill="#064E3B">Spatial knowledge graph</text>
  <text x="670" y="566" font-size="12" font-weight="700" fill="#065F46">★ PUBLIC GOOD</text>

  <!-- HiGHS / open solvers (was "classical solvers" in VC map) -->
  <circle cx="1047" cy="648" r="8" fill="#0E7490" stroke="white" stroke-width="2"/>
  <text x="1060" y="645" font-size="11" font-weight="600" fill="#0E7490">HiGHS · OR-Tools</text>
  <text x="1060" y="658" font-size="10" fill="#155E75" font-style="italic">U. Edinburgh anchor</text>

  <!-- LLMs -->
  <circle cx="1127.5" cy="470" r="9" fill="#9CA3AF" stroke="#6B7280" stroke-width="2"/>
  <text x="1143" y="467" font-size="11" fill="#4B5563">LLMs</text>
  <text x="1143" y="480" font-size="10" fill="#6B7280" font-style="italic">frontier + open-weight</text>

  <!-- UK public data cluster -->
