    <rect x="160" y="670" width="300" height="105" fill="#1F2937" rx="6"/>
    <text x="310" y="695" text-anchor="middle" font-size="13" font-weight="700" fill="#FDE68A">THE UK WINDOW · WHY NOW</text>
    <line x1="180" y1="702" x2="440" y2="702" stroke="#4B5563" stroke-width="1"/>
    <text x="175" y="720" font-size="10" fill="#F3F4F6">• Geospatial Commission FAIR push is active</text>
    <text x="175" y="735" font-size="10" fill="#F3F4F6">• ARIA Collective Flourishing space is open</text>
    <text x="175" y="750" font-size="10" fill="#F3F4F6">• AI Playbook + ATRS create institutional demand</text>
    <text x="175" y="765" font-size="10" fill="#F3F4F6">• HiGHS at competitive maturity (U. Edinburgh)</text>
