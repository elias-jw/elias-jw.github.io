    <path d="M 485 405 L 601 415" stroke="#047857" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="310" y="390" width="175" height="42" fill="#ECFDF5" stroke="#047857" stroke-width="1.5" rx="5"/>
    <text x="397" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">③ GEOSPATIAL COMMISSION</text>
    <text x="397" y="423" text-anchor="middle" font-size="9" fill="#065F46" font-style="italic">standards work · FAIR principles</text>
  </g>

  <!-- PLAY 4: Publish under OGL on spatial KG -->
  <g>
    <path d="M 480 525 L 622 553" stroke="#047857" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    <rect x="295" y="505" width="185" height="42" fill="#D1FAE5" stroke="#047857" stroke-width="2" rx="5"/>
    <text x="387" y="523" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">④ PUBLISH UNDER OGL</text>
    <text x="387" y="538" text-anchor="middle" font-size="9" fill="#064E3B" font-style="italic">spatial KG as public infrastructure</text>
