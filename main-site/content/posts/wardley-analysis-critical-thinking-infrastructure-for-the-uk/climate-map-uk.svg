<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowStd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowCommons" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <marker id="arrowSubstrate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0E7490"/>
    </marker>
    <marker id="arrowMandate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B45309"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#FAFAFA"/>

  <text x="700" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Climate and gameplay — the UK public infrastructure window</text>
  <text x="700" y="62" text-anchor="middle" font-size="13" fill="#6B7280">Strategic plays on the simplified map, with the macro forces that make now the right moment for a UK-anchored play</text>

  <rect x="150" y="100" width="1150" height="680" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>

  <line x1="437.5" y1="100" x2="437.5" y2="780" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="725" y1="100" x2="725" y2="780" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="1012.5" y1="100" x2="1012.5" y2="780" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="293.75" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Genesis</text>
  <text x="581.25" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Custom-built</text>
  <text x="868.75" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Product</text>
  <text x="1156.25" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Commodity</text>
  <text x="725" y="828" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">Evolution →</text>

  <text x="140" y="118" text-anchor="end" font-size="11" fill="#6B7280">Visible</text>
  <text x="140" y="782" text-anchor="end" font-size="11" fill="#6B7280">Invisible</text>
  <text x="60" y="440" text-anchor="middle" font-size="13" font-weight="700" fill="#374151" transform="rotate(-90, 60, 440)">Value chain</text>

  <!-- CLIMATE FORCE 1: UK public data commons expanding (green, right-moving top area) -->
  <g opacity="0.75">
    <path d="M 790 350 Q 1000 330, 1270 350" fill="none" stroke="#047857" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrowCommons)"/>
    <rect x="805" y="288" width="290" height="44" fill="#ECFDF5" stroke="#047857" stroke-width="1" rx="4"/>
    <text x="950" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">UK PUBLIC DATA COMMONS EXPANDING</text>
    <text x="950" y="321" text-anchor="middle" font-size="10" fill="#065F46" font-style="italic">Geospatial Commission FAIR principles · NUAR · OS data expansion</text>
  </g>

  <!-- CLIMATE FORCE 2: Open source substrate maturing (teal, right-moving, lower band) -->
  <g opacity="0.85">
    <path d="M 780 615 L 1270 615" fill="none" stroke="#0E7490" stroke-width="4" marker-end="url(#arrowSubstrate)"/>
    <rect x="800" y="586" width="320" height="26" fill="#ECFEFF" stroke="#0E7490" stroke-width="1" rx="4"/>
    <text x="960" y="604" text-anchor="middle" font-size="11" font-weight="700" fill="#0E7490">OPEN SOURCE SUBSTRATE MATURING (HiGHS · OR-Tools · H3)</text>
  </g>

