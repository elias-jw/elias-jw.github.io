  <g>
    <path d="M 940 466 L 670 540" stroke="#991B1B" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="835" y="425" width="210" height="42" fill="#FEF2F2" stroke="#991B1B" stroke-width="1.5" rx="5"/>
    <text x="940" y="443" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">⑦ DOCUMENT THE INERTIA TRADE</text>
    <text x="940" y="458" text-anchor="middle" font-size="9" fill="#7F1D1D" font-style="italic">Rust + ECS + bitemporal, named publicly</text>
  </g>

  <!-- PLAY 8: Sovereign cloud default -->
  <g>
    <path d="M 830 785 L 1255 748" stroke="#B45309" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="730" y="760" width="200" height="42" fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" rx="5"/>
    <text x="830" y="778" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">⑧ CROWN HOSTING DEFAULT</text>
    <text x="830" y="793" text-anchor="middle" font-size="9" fill="#92400E" font-style="italic">UK sovereign for OFFICIAL data</text>
  </g>

  <!-- THREAT annotation -->
  <g opacity="0.9">
    <rect x="1075" y="170" width="210" height="70" fill="#FEF2F2" stroke="#991B1B" stroke-width="1.5" stroke-dasharray="3,3" rx="5"/>
    <text x="1180" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">THREAT: INCUMBENT BUNDLING</text>
    <text x="1180" y="203" text-anchor="middle" font-size="9" fill="#7F1D1D" font-style="italic">Esri, Palantir, MS+OpenAI already</text>
    <text x="1180" y="216" text-anchor="middle" font-size="9" fill="#7F1D1D" font-style="italic">embedded via G-Cloud / CCS</text>
    <text x="1180" y="229" text-anchor="middle" font-size="9" fill="#7F1D1D" font-style="italic">counter: OGL + academic + standards</text>
    <path d="M 1180 240 L 1135 460" stroke="#991B1B" stroke-width="1" stroke-dasharray="2,3" fill="none"/>
  </g>

  <!-- THE UK WINDOW callout (why now) -->
