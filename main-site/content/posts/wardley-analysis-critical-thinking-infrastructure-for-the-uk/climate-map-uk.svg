  <text x="1222" y="713" font-size="11" font-weight="600" fill="#065F46">UK public data</text>
  <text x="1222" y="725" font-size="9" fill="#047857">OS · ONS · LR · VOA · CH</text>

  <circle cx="1180" cy="680" r="5" fill="#9CA3AF" stroke="white" stroke-width="1.5"/>
  <text x="1190" y="683" font-size="10" fill="#6B7280">H3 index</text>

  <circle cx="1255" cy="745" r="5" fill="#9CA3AF" stroke="white" stroke-width="1.5"/>
  <text x="1265" y="748" font-size="10" fill="#6B7280">Crown Hosting</text>

  <!-- STRATEGIC PLAYS -->

  <!-- PLAY 1: ATRS alignment on inspectable trace -->
  <g>
    <path d="M 400 145 L 520 170" stroke="#1E3A8A" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="220" y="125" width="185" height="42" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="5"/>
    <text x="312" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A">① ATRS ALIGNMENT</text>
    <text x="312" y="158" text-anchor="middle" font-size="9" fill="#1E40AF" font-style="italic">reference implementation of the standard</text>
  </g>

  <!-- PLAY 2: UK research partnership on AI facilitator -->
  <g>
    <path d="M 270 300 L 403 267" stroke="#5B21B6" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="160" y="280" width="205" height="42" fill="#F5F3FF" stroke="#5B21B6" stroke-width="1.5" rx="5"/>
    <text x="262" y="298" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">② UK RESEARCH PARTNERSHIP</text>
    <text x="262" y="313" text-anchor="middle" font-size="9" fill="#6D28D9" font-style="italic">ARIA · Turing · Edinburgh · Cambridge</text>
