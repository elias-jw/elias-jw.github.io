<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowStd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowForce" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
    <marker id="arrowCap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <marker id="arrowReg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B45309"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Gameplay and climate — why this venture, why now</text>
  <text x="700" y="62" text-anchor="middle" font-size="13" fill="#6B7280">Strategic plays overlaid on the simplified map, with the macro forces that make the moment right</text>

  <!-- Plot area -->
  <rect x="150" y="100" width="1150" height="680" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Evolution band dividers -->
  <line x1="437.5" y1="100" x2="437.5" y2="780" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="725" y1="100" x2="725" y2="780" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="1012.5" y1="100" x2="1012.5" y2="780" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- X-axis labels -->
  <text x="293.75" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Genesis</text>
  <text x="581.25" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Custom-Built</text>
  <text x="868.75" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Product</text>
  <text x="1156.25" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Commodity</text>
  <text x="725" y="828" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">Evolution →</text>

  <!-- Y-axis labels -->
  <text x="140" y="118" text-anchor="end" font-size="11" fill="#6B7280">Visible</text>
  <text x="140" y="782" text-anchor="end" font-size="11" fill="#6B7280">Invisible</text>
  <text x="60" y="440" text-anchor="middle" font-size="13" font-weight="700" fill="#374151" transform="rotate(-90, 60, 440)">Value chain</text>

  <!-- CLIMATE FORCE 1: Capital migration (green, left-moving across the middle) -->
  <g opacity="0.75">
    <path d="M 1200 340 Q 800 310, 500 360" fill="none" stroke="#047857" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrowCap)"/>
    <rect x="790" y="278" width="250" height="42" fill="#ECFDF5" stroke="#047857" stroke-width="1" rx="4"/>
    <text x="915" y="296" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">CAPITAL MIGRATION</text>
    <text x="915" y="311" text-anchor="middle" font-size="10" fill="#065F46" font-style="italic">from model layer to substrate layer</text>
  </g>

  <!-- CLIMATE FORCE 2: LLM commoditisation accelerating (red, right-moving, low on map) -->
  <g opacity="0.85">
    <path d="M 750 720 L 1270 720" fill="none" stroke="#DC2626" stroke-width="4" marker-end="url(#arrowForce)"/>
    <rect x="830" y="690" width="300" height="26" fill="#FEF2F2" stroke="#DC2626" stroke-width="1" rx="4"/>
    <text x="980" y="708" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">LLMs COMMODITISING (monthly cadence)</text>
  </g>

  <!-- CLIMATE FORCE 3: Regulatory pressure (amber, upward from below) -->
  <g opacity="0.85">
    <path d="M 644 820 L 644 635" fill="none" stroke="#B45309" stroke-width="4" marker-end="url(#arrowReg)"/>
    <rect x="500" y="845" width="290" height="40" fill="#FFFBEB" stroke="#B45309" stroke-width="1" rx="4"/>
    <text x="645" y="862" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">REGULATORY TAILWIND</text>
    <text x="645" y="877" text-anchor="middle" font-size="10" fill="#92400E" font-style="italic">CSDDD · climate disclosure · supply chain resilience</text>
  </g>

  <!-- KEY COMPONENTS (simplified set) -->

  <!-- Anchor C1 -->
  <g transform="translate(640, 108)">
    <polygon points="0,-14 4,-4 14,-4 6,3 9,14 0,7 -9,14 -6,3 -14,-4 -4,-4" fill="#991B1B" stroke="#450A0A" stroke-width="1.5"/>
  </g>
  <text x="660" y="100" font-size="12" font-weight="700" fill="#450A0A">Decision in validity window</text>

  <!-- C2 Inspectable trace -->
  <circle cx="529.5" cy="173" r="9" fill="#1E40AF" stroke="white" stroke-width="2"/>
  <text x="544" y="170" font-size="12" font-weight="600" fill="#111827">Inspectable trace</text>

  <!-- C4 AI facilitator -->
  <circle cx="414.5" cy="265" r="11" fill="#7B2CBF" stroke="white" stroke-width="2"/>
  <text x="430" y="262" font-size="12" font-weight="700" fill="#111827">AI facilitator</text>
  <text x="430" y="277" font-size="10" fill="#7B2CBF" font-style="italic">research bet</text>

  <!-- C7 Ontology framework -->
  <circle cx="610" cy="417" r="9" fill="#1E40AF" stroke="#047857" stroke-width="2.5"/>
  <text x="625" y="414" font-size="12" font-weight="600" fill="#111827">Ontology framework</text>

  <!-- C12 Spatial KG - THE MOAT -->
  <circle cx="644.5" cy="555" r="26" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" opacity="0.9"/>
  <circle cx="644.5" cy="555" r="13" fill="#F59E0B" stroke="#78350F" stroke-width="2.5"/>
  <text x="670" y="550" font-size="14" font-weight="700" fill="#78350F">Spatial knowledge graph</text>
  <text x="670" y="566" font-size="12" font-weight="700" fill="#92400E">★ THE MOAT</text>

  <!-- C10 Classical solvers -->
  <circle cx="1047" cy="648" r="8" fill="#6B7280" stroke="white" stroke-width="2"/>
  <text x="1060" y="651" font-size="11" fill="#4B5563">Classical solvers</text>

  <!-- C14 LLMs -->
  <circle cx="1127.5" cy="600" r="9" fill="#9CA3AF" stroke="#DC2626" stroke-width="2"/>
  <text x="1143" y="597" font-size="11" fill="#4B5563">LLMs</text>

  <!-- C13 H3, C15 Geo, C18 Cloud (small commodity cluster) -->
  <circle cx="1190" cy="670" r="5" fill="#9CA3AF" stroke="white" stroke-width="1.5"/>
  <text x="1200" y="673" font-size="10" fill="#6B7280">H3</text>
  <circle cx="1230" cy="690" r="5" fill="#9CA3AF" stroke="white" stroke-width="1.5"/>
  <text x="1240" y="693" font-size="10" fill="#6B7280">Geo data</text>
  <circle cx="1260" cy="730" r="5" fill="#9CA3AF" stroke="white" stroke-width="1.5"/>
  <text x="1270" y="733" font-size="10" fill="#6B7280">Cloud</text>

  <!-- STRATEGIC PLAYS — annotated bubbles -->

  <!-- PLAY 1: Land grab — on C2 (category claim) -->
  <g>
    <path d="M 400 145 L 520 170" stroke="#1E3A8A" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="230" y="125" width="170" height="42" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5" rx="5"/>
    <text x="315" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A">① LAND GRAB</text>
    <text x="315" y="158" text-anchor="middle" font-size="9" fill="#1E40AF" font-style="italic">claim the category name</text>
  </g>

  <!-- PLAY 2: First mover / fast follower — on C4 -->
  <g>
    <path d="M 255 300 L 403 267" stroke="#5B21B6" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="155" y="280" width="195" height="42" fill="#F5F3FF" stroke="#5B21B6" stroke-width="1.5" rx="5"/>
    <text x="252" y="298" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">② FAST FOLLOWER ON AI</text>
    <text x="252" y="313" text-anchor="middle" font-size="9" fill="#6D28D9" font-style="italic">let labs pay for training</text>
  </g>

  <!-- PLAY 3: Open approaches — on C7 -->
  <g>
    <path d="M 475 400 L 601 415" stroke="#047857" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="325" y="385" width="150" height="42" fill="#ECFDF5" stroke="#047857" stroke-width="1.5" rx="5"/>
    <text x="400" y="403" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">③ OPEN APPROACHES</text>
    <text x="400" y="418" text-anchor="middle" font-size="9" fill="#065F46" font-style="italic">OSS the substrate lever</text>
  </g>

  <!-- PLAY 4: Tower & Moat — on C12 -->
  <g>
    <path d="M 480 540 L 622 553" stroke="#92400E" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    <rect x="300" y="518" width="180" height="42" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="5"/>
    <text x="390" y="536" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">④ TOWER &amp; MOAT</text>
    <text x="390" y="551" text-anchor="middle" font-size="9" fill="#78350F" font-style="italic">amortisable substrate</text>
  </g>

  <!-- PLAY 5: N-sided market — below C12 (Series B/C) -->
  <g>
    <path d="M 420 620 L 625 575" stroke="#6B21A8" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="245" y="600" width="180" height="42" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1.5" rx="5"/>
    <text x="335" y="618" text-anchor="middle" font-size="11" font-weight="700" fill="#6B21A8">⑤ N-SIDED MARKET</text>
    <text x="335" y="633" text-anchor="middle" font-size="9" fill="#581C87" font-style="italic">v2 federated base layer</text>
  </g>

  <!-- PLAY 6: Alliances — on ARIA/solvers -->
  <g>
    <path d="M 960 660 L 1040 650" stroke="#0E7490" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="790" y="635" width="170" height="42" fill="#ECFEFF" stroke="#0E7490" stroke-width="1.5" rx="5"/>
    <text x="875" y="653" text-anchor="middle" font-size="11" font-weight="700" fill="#0E7490">⑥ ALLIANCES</text>
    <text x="875" y="668" text-anchor="middle" font-size="9" fill="#155E75" font-style="italic">ARIA · solvers · clouds</text>
  </g>

  <!-- PLAY 7: Sensing engines / ILC — between layers -->
  <g>
    <path d="M 850 480 L 655 550" stroke="#374151" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="830" y="455" width="200" height="42" fill="#F9FAFB" stroke="#374151" stroke-width="1.5" rx="5"/>
    <text x="930" y="473" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">⑦ SENSING / ILC LOOP</text>
    <text x="930" y="488" text-anchor="middle" font-size="9" fill="#4B5563" font-style="italic">traces → promote micro-tools</text>
  </g>

  <!-- PLAY 8: Industrial policy — near the regulatory force at bottom -->
  <g>
    <path d="M 800 780 L 700 725" stroke="#B45309" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    <rect x="745" y="760" width="200" height="42" fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" rx="5"/>
    <text x="845" y="778" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">⑧ INDUSTRIAL POLICY</text>
    <text x="845" y="793" text-anchor="middle" font-size="9" fill="#92400E" font-style="italic">ride the regulation wave</text>
  </g>

  <!-- THREAT annotations -->

  <!-- Threat 1: Embrace and extend on LLMs side -->
  <g opacity="0.9">
    <rect x="1075" y="170" width="210" height="56" fill="#FEF2F2" stroke="#991B1B" stroke-width="1.5" stroke-dasharray="3,3" rx="5"/>
    <text x="1180" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">THREAT: EMBRACE &amp; EXTEND</text>
    <text x="1180" y="203" text-anchor="middle" font-size="9" fill="#7F1D1D" font-style="italic">hyperscalers bundle grounded features</text>
    <text x="1180" y="216" text-anchor="middle" font-size="9" fill="#7F1D1D" font-style="italic">into their stack at zero price</text>
    <path d="M 1180 228 L 1135 590" stroke="#991B1B" stroke-width="1" stroke-dasharray="2,3" fill="none"/>
  </g>

  <!-- THE MOMENT callout (why now) -->
  <g>
    <rect x="160" y="670" width="270" height="96" fill="#1F2937" rx="6"/>
    <text x="295" y="695" text-anchor="middle" font-size="13" font-weight="700" fill="#FDE68A">WHY NOW</text>
    <line x1="180" y1="702" x2="410" y2="702" stroke="#4B5563" stroke-width="1"/>
    <text x="175" y="722" font-size="10" fill="#F3F4F6">• Substrate cost has crossed viability</text>
    <text x="175" y="738" font-size="10" fill="#F3F4F6">• LLM wave defined the speed benchmark</text>
    <text x="175" y="754" font-size="10" fill="#F3F4F6">• Regulation has made grounding a requirement</text>
  </g>
</svg>
