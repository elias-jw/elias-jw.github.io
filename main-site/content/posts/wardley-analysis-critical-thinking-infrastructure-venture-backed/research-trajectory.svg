<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="phaseArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <linearGradient id="gradV0" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="gradV1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="gradV2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3E8FF"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="780" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Research trajectory — from validated consulting to category infrastructure</text>
  <text x="700" y="62" text-anchor="middle" font-size="13" fill="#6B7280">Three horizons: what is tested · what is being built · what unlocks at scale</text>

  <!-- Phase headers -->
  <!-- v0 -->
  <rect x="60" y="100" width="420" height="56" fill="url(#gradV0)" stroke="#1E40AF" stroke-width="2" rx="6"/>
  <text x="270" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A8A">v0 — Urban logistics</text>
  <text x="270" y="146" text-anchor="middle" font-size="11" fill="#1E40AF" font-style="italic">2020–2026 · partially tested in production</text>

  <!-- v1 -->
  <rect x="490" y="100" width="420" height="56" fill="url(#gradV1)" stroke="#B45309" stroke-width="2" rx="6"/>
  <text x="700" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#78350F">v1 — Supply chains + AI facilitator</text>
  <text x="700" y="146" text-anchor="middle" font-size="11" fill="#92400E" font-style="italic">2026–2028 · current research target</text>

  <!-- v2 -->
  <rect x="920" y="100" width="420" height="56" fill="url(#gradV2)" stroke="#6B21A8" stroke-width="2" rx="6"/>
  <text x="1130" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#581C87">v2 — Federated decision intelligence</text>
  <text x="1130" y="146" text-anchor="middle" font-size="11" fill="#6B21A8" font-style="italic">2028+ · Series B/C story · blue sky</text>

  <!-- Phase arrows between columns -->
  <line x1="480" y1="128" x2="488" y2="128" stroke="#374151" stroke-width="2.5" marker-end="url(#phaseArrow)"/>
  <line x1="910" y1="128" x2="918" y2="128" stroke="#374151" stroke-width="2.5" marker-end="url(#phaseArrow)"/>

  <!-- SCOPE row -->
  <text x="60" y="190" font-size="11" font-weight="700" fill="#6B7280">SCOPE</text>

  <!-- v0 scope -->
  <rect x="60" y="200" width="420" height="70" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="75" y="222" font-size="12" font-weight="600" fill="#111827">Single city · single organisation</text>
  <text x="75" y="240" font-size="11" fill="#374151">Bespoke implementations · human facilitator in the room</text>
  <text x="75" y="258" font-size="11" fill="#374151">Decisions worth £50m–£500m+ per engagement</text>

  <!-- v1 scope -->
  <rect x="490" y="200" width="420" height="70" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="505" y="222" font-size="12" font-weight="600" fill="#111827">Multiple geographies · multiple enterprises</text>
  <text x="505" y="240" font-size="11" fill="#374151">Shared spatial substrate · AI facilitator with human fallback</text>
  <text x="505" y="258" font-size="11" fill="#374151">Extends upstream: movement → production → procurement</text>

  <!-- v2 scope -->
  <rect x="920" y="200" width="420" height="70" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="935" y="222" font-size="12" font-weight="600" fill="#111827">Global · federated · public base layer</text>
  <text x="935" y="240" font-size="11" fill="#374151">Decision-trace dataset · anonymised · consented</text>
  <text x="935" y="258" font-size="11" fill="#374151">Research instrument for collective intelligence</text>

  <!-- ARCHITECTURE LAYERS row -->
  <text x="60" y="300" font-size="11" font-weight="700" fill="#6B7280">ARCHITECTURE LIVE AT THIS PHASE</text>

  <!-- v0 architecture -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="420" height="190" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>
    <!-- Layers -->
    <rect x="14" y="14" width="392" height="28" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1" rx="3"/>
    <text x="210" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#1E3A8A">Micro-tools · bespoke per project</text>

    <rect x="14" y="48" width="392" height="28" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1" rx="3"/>
    <text x="210" y="67" text-anchor="middle" font-size="11" font-weight="600" fill="#1E3A8A">Solver adapters · custom glue each time</text>

    <rect x="14" y="82" width="392" height="28" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="210" y="101" text-anchor="middle" font-size="11" font-style="italic" fill="#6B7280">Ontology framework · implicit, in facilitator's head</text>

    <rect x="14" y="116" width="392" height="28" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="210" y="135" text-anchor="middle" font-size="11" font-style="italic" fill="#6B7280">Spatial KG · rebuilt per project</text>

    <rect x="14" y="150" width="392" height="28" fill="#E0E7FF" stroke="#4338CA" stroke-width="1" rx="3"/>
    <text x="210" y="169" text-anchor="middle" font-size="11" font-weight="600" fill="#3730A3">HUMAN facilitator (scarce, expensive)</text>
  </g>

  <!-- v1 architecture -->
  <g transform="translate(490, 310)">
    <rect x="0" y="0" width="420" height="190" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>

    <rect x="14" y="14" width="392" height="28" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="3"/>
    <text x="210" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Micro-tools · composable framework</text>

    <rect x="14" y="48" width="392" height="28" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="3"/>
    <text x="210" y="67" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Solver contracts · extract-compute-rehydrate</text>

    <rect x="14" y="82" width="392" height="28" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="3"/>
    <text x="210" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Ontology framework · declarative, runtime-loaded</text>

    <rect x="14" y="116" width="392" height="28" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="3"/>
    <text x="210" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">★ Spatial KG · built once per geography</text>

    <rect x="14" y="150" width="392" height="28" fill="#FDE68A" stroke="#92400E" stroke-width="1.5" rx="3"/>
    <text x="210" y="169" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">AI facilitator (with human fallback)</text>
  </g>

  <!-- v2 architecture -->
  <g transform="translate(920, 310)">
    <rect x="0" y="0" width="420" height="190" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>

    <rect x="14" y="14" width="392" height="28" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1" rx="3"/>
    <text x="210" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#581C87">Micro-tools + community contributions</text>

    <rect x="14" y="48" width="392" height="28" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1" rx="3"/>
    <text x="210" y="67" text-anchor="middle" font-size="11" font-weight="600" fill="#581C87">Solver contracts + social layer (framing models)</text>

    <rect x="14" y="82" width="392" height="28" fill="#F3E8FF" stroke="#6B21A8" stroke-width="1" rx="3"/>
    <text x="210" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#581C87">Shared ontologies · multi-domain · versioned</text>

    <rect x="14" y="116" width="392" height="28" fill="#E9D5FF" stroke="#581C87" stroke-width="1.5" rx="3"/>
    <text x="210" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#581C87">★ Federated Spatial KG · public substrate</text>

    <rect x="14" y="150" width="392" height="28" fill="#E9D5FF" stroke="#581C87" stroke-width="1.5" rx="3"/>
    <text x="210" y="169" text-anchor="middle" font-size="11" font-weight="700" fill="#581C87">AI + decision-trace-trained facilitator</text>
  </g>

  <!-- THE BET row -->
  <text x="60" y="530" font-size="11" font-weight="700" fill="#6B7280">THE BET · WHAT MUST BE TRUE</text>

  <!-- v0 bet -->
  <rect x="60" y="540" width="420" height="90" fill="white" stroke="#1E40AF" stroke-width="1.5" rx="4"/>
  <text x="75" y="562" font-size="12" font-weight="700" fill="#1E3A8A">Validated ✓</text>
  <text x="75" y="582" font-size="11" fill="#374151">Explore–decide loop outperforms traditional workflow.</text>
  <text x="75" y="598" font-size="11" fill="#374151">Scenario comparison changes how planners think.</text>
  <text x="75" y="614" font-size="11" fill="#374151">Human facilitator is the compression bottleneck.</text>

  <!-- v1 bet -->
  <rect x="490" y="540" width="420" height="90" fill="white" stroke="#B45309" stroke-width="1.5" rx="4"/>
  <text x="505" y="562" font-size="12" font-weight="700" fill="#92400E">Research risk ⚠</text>
  <text x="505" y="582" font-size="11" fill="#374151">LLM can translate NL into graph queries reliably.</text>
  <text x="505" y="598" font-size="11" fill="#374151">Ontology framework works as configuration-not-code.</text>
  <text x="505" y="614" font-size="11" fill="#374151">Substrate amortises: 10th project &lt;&lt; 1st project cost.</text>

  <!-- v2 bet -->
  <rect x="920" y="540" width="420" height="90" fill="white" stroke="#6B21A8" stroke-width="1.5" rx="4"/>
  <text x="935" y="562" font-size="12" font-weight="700" fill="#581C87">Institutional risk ⚠⚠</text>
  <text x="935" y="582" font-size="11" fill="#374151">Enterprises share anonymised traces under consent.</text>
  <text x="935" y="598" font-size="11" fill="#374151">Public substrate governance is tractable.</text>
  <text x="935" y="614" font-size="11" fill="#374151">Decision traces are actually inspected by the collective.</text>

  <!-- VENTURE STAGE row -->
  <text x="60" y="660" font-size="11" font-weight="700" fill="#6B7280">VENTURE STAGE</text>
  <rect x="60" y="670" width="420" height="38" fill="#1E40AF" rx="4"/>
  <text x="270" y="694" text-anchor="middle" font-size="13" font-weight="700" fill="white">Proof of thesis · pre-seed / seed</text>

  <rect x="490" y="670" width="420" height="38" fill="#B45309" rx="4"/>
  <text x="700" y="694" text-anchor="middle" font-size="13" font-weight="700" fill="white">Category claim · Seed → Series A</text>

  <rect x="920" y="670" width="420" height="38" fill="#6B21A8" rx="4"/>
  <text x="1130" y="694" text-anchor="middle" font-size="13" font-weight="700" fill="white">Infrastructure play · Series B / C</text>

  <!-- Footer note -->
  <text x="700" y="745" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">
    The architecture is stable across all three phases. The models attached to it, the customer base, and the data flowing through it are what evolve.
  </text>
  <text x="700" y="762" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">
    Each phase de-risks the next; the moat compounds rather than resets.
  </text>
</svg>
