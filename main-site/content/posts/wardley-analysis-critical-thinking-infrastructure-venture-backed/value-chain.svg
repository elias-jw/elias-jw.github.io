<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1080" width="1200" height="1080" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Value chain of the venture case: the four-layer architecture as a dependency graph</title>
  <desc>A vertical value chain diagram showing the architecture as a top-down dependency graph for the VC-backed venture case. Components are coloured by sourcing strategy: purple custom build, teal open source, amber commercial product, gray commodity utility. Strategic annotations overlay the map: a gold dashed ring marks the spatial knowledge graph as the moat, diamond markers identify the three components recommended for open-sourcing, and a star marks the AI facilitator as the load-bearing research bet.</desc>

  <defs>
    <marker id="vc-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888780"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="1080" fill="#ffffff"/>

  <text x="60" y="48" font-size="22" font-weight="600" fill="#2C2C2A">Value chain — the venture case</text>
  <text x="60" y="72" font-size="13" fill="#5F5E5A">Top-down dependencies. Colour = sourcing strategy. The moat sits in the custom middle, supported by multi-vendor commodity below.</text>

  <g font-size="11" fill="#888780" font-style="italic" text-anchor="end">
    <text x="1150" y="132">User need</text>
    <text x="1150" y="226">Access layer</text>
    <text x="1150" y="368">Composition layer</text>
    <text x="1150" y="466">Domain graph layer</text>
    <text x="1150" y="630">Engine layer</text>
    <text x="1150" y="788">Compute layer</text>
    <text x="1150" y="958">Foundation layer</text>
  </g>

  <!-- Band 0: User need -->
  <g>
    <rect x="440" y="100" width="320" height="64" rx="8" fill="#FAECE7" stroke="#712B13" stroke-width="1.5"/>
    <text x="600" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#4A1B0C">User need</text>
    <text x="600" y="146" text-anchor="middle" font-size="11" fill="#712B13">Fast, grounded, inspectable answers</text>
    <text x="600" y="160" text-anchor="middle" font-size="11" fill="#712B13">within the decision validity window</text>
  </g>

  <line x1="60" y1="186" x2="1140" y2="186" stroke="#ede9dc" stroke-width="1"/>

  <!-- Connectors user need -> access -->
  <line x1="540" y1="164" x2="355" y2="204" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="600" y1="164" x2="640" y2="204" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="660" y1="164" x2="925" y2="204" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>

  <!-- Band 1: Access layer -->
  <g>
    <rect x="220" y="208" width="270" height="84" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="1.5"/>
    <text x="355" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">AI facilitator</text>
    <text x="355" y="252" text-anchor="middle" font-size="11" fill="#3C3489">Natural language to graph queries</text>
    <text x="355" y="282" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">Genesis · custom build · primary research bet</text>
    <polygon points="460,222 463,231 473,231 465,237 468,247 460,241 452,247 455,237 447,231 457,231" fill="#7B2CBF" stroke="#3C1A66" stroke-width="0.8"/>
  </g>

  <g>
    <rect x="505" y="208" width="270" height="84" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="1.5"/>
    <text x="640" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Social layer (framing)</text>
    <text x="640" y="252" text-anchor="middle" font-size="11" fill="#3C3489">Same answer, different reader</text>
    <text x="640" y="282" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">Genesis · custom build · compounding research bet</text>
    <polygon points="745,222 748,231 758,231 750,237 753,247 745,241 737,247 740,237 732,231 742,231" fill="#FFFFFF" stroke="#7B2CBF" stroke-width="1.4"/>
  </g>

  <g>
    <rect x="790" y="208" width="270" height="84" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="1.5"/>
    <text x="925" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Inspectable traces</text>
    <text x="925" y="252" text-anchor="middle" font-size="11" fill="#3C3489">Structural consequence of P5, P7</text>
    <text x="925" y="282" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">Custom-built · category-defining capability</text>
  </g>

  <line x1="60" y1="318" x2="1140" y2="318" stroke="#ede9dc" stroke-width="1"/>

  <!-- Connectors access -> composition -->
  <line x1="355" y1="292" x2="540" y2="346" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="640" y1="292" x2="640" y2="346" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="925" y1="292" x2="720" y2="346" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>

  <!-- Band 2: Composition layer -->
  <g>
    <rect x="400" y="354" width="480" height="62" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="1.5"/>
    <text x="640" y="380" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Micro-tools layer (P9)</text>
    <text x="640" y="398" text-anchor="middle" font-size="11" fill="#3C3489">Composable, read-only: ingest · explore · compare · render</text>
  </g>

  <line x1="60" y1="442" x2="1140" y2="442" stroke="#ede9dc" stroke-width="1"/>

  <!-- Connectors composition -> domain graph -->
  <line x1="490" y1="416" x2="355" y2="484" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="640" y1="416" x2="640" y2="484" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="790" y1="416" x2="925" y2="484" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>

  <!-- Band 3: Domain graph layer -->
  <g>
    <rect x="220" y="492" width="270" height="84" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="1.5"/>
    <text x="355" y="518" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Domain ontology framework</text>
    <text x="355" y="536" text-anchor="middle" font-size="11" fill="#3C3489">Declarative, runtime-loaded (P4)</text>
    <text x="355" y="566" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">Custom · open-source target · per deployment</text>
    <polygon points="475,506 483,514 475,522 467,514" fill="#0F8B5C" stroke="#06432B" stroke-width="0.8"/>
  </g>

  <!-- Spatial knowledge graph — THE MOAT -->
  <g>
    <circle cx="640" cy="534" r="86" fill="none" stroke="#D4860A" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.85"/>
    <rect x="505" y="492" width="270" height="84" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="1.5"/>
    <text x="640" y="518" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Spatial knowledge graph</text>
    <text x="640" y="536" text-anchor="middle" font-size="11" fill="#3C3489">Per-geography, shared across projects</text>
    <text x="640" y="566" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">Custom integration of commodity inputs</text>
    <rect x="580" y="584" width="120" height="22" rx="11" fill="#D4860A" stroke="#7A4D04" stroke-width="1"/>
    <text x="640" y="599" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFBED">★ THE MOAT</text>
  </g>

  <g>
    <rect x="790" y="492" width="270" height="84" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="1.5"/>
    <text x="925" y="518" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Rehydration contracts</text>
    <text x="925" y="536" text-anchor="middle" font-size="11" fill="#3C3489">Extract-compute-rehydrate (P6, P7)</text>
    <text x="925" y="566" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">Custom · open-source target · makes solvers swappable</text>
    <polygon points="1030,506 1038,514 1030,522 1022,514" fill="#0F8B5C" stroke="#06432B" stroke-width="0.8"/>
  </g>

  <line x1="60" y1="630" x2="1140" y2="630" stroke="#ede9dc" stroke-width="1"/>

  <!-- Connectors domain graph -> engine -->
  <line x1="355" y1="576" x2="540" y2="686" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="640" y1="620" x2="640" y2="686" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="925" y1="576" x2="740" y2="686" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>

  <!-- Band 4: Engine layer -->
  <g>
    <rect x="400" y="694" width="480" height="86" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="2"/>
    <text x="640" y="720" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">Graph engine — Rust · ECS · immutable · bitemporal</text>
    <text x="640" y="738" text-anchor="middle" font-size="11" fill="#3C3489">Makes P3 (ECS), P5 (temporal lineage), P7 (contracts) structural</text>
    <text x="640" y="766" text-anchor="middle" font-size="10" font-style="italic" fill="#534AB7">Custom · open-source target · resists pull to Neo4j / Kuzu</text>
    <polygon points="420,714 428,722 420,730 412,722" fill="#0F8B5C" stroke="#06432B" stroke-width="0.8"/>
    <g stroke="#A32D2D" stroke-width="2.5" stroke-linecap="round">
      <line x1="896" y1="712" x2="912" y2="728"/>
      <line x1="912" y1="712" x2="896" y2="728"/>
    </g>
    <text x="920" y="727" font-size="10" font-weight="500" fill="#A32D2D">deliberate inertia</text>
  </g>

  <line x1="60" y1="806" x2="1140" y2="806" stroke="#ede9dc" stroke-width="1"/>

  <!-- Connectors engine -> compute -->
  <line x1="460" y1="780" x2="180" y2="836" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="560" y1="780" x2="440" y2="836" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="720" y1="780" x2="720" y2="836" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="820" y1="780" x2="1000" y2="836" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>

  <!-- Band 5: Compute layer -->
  <g>
    <rect x="60" y="844" width="240" height="84" rx="8" fill="#FAEEDA" stroke="#633806" stroke-width="1.5"/>
    <text x="180" y="868" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">LLMs</text>
    <text x="180" y="884" text-anchor="middle" font-size="10" fill="#854F0B">Frontier: Claude · GPT · Gemini</text>
    <text x="180" y="898" text-anchor="middle" font-size="10" fill="#854F0B">Open-weight: Llama · Mistral · Qwen</text>
    <text x="180" y="916" text-anchor="middle" font-size="10" font-style="italic" fill="#633806">Multi-vendor · concentration risk managed</text>
  </g>

  <g>
    <rect x="320" y="844" width="240" height="84" rx="8" fill="#E1F5EE" stroke="#085041" stroke-width="1.5"/>
    <text x="440" y="868" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Entity resolution / geocoding</text>
    <text x="440" y="884" text-anchor="middle" font-size="10" fill="#0F6E56">Open source: Splink · libpostal</text>
    <text x="440" y="898" text-anchor="middle" font-size="10" fill="#0F6E56">Commercial: Mapbox · HERE · Google</text>
    <text x="440" y="916" text-anchor="middle" font-size="10" font-style="italic" fill="#085041">Hybrid · per-geography integration</text>
  </g>

  <g>
    <rect x="580" y="844" width="280" height="84" rx="8" fill="#E1F5EE" stroke="#085041" stroke-width="2"/>
    <text x="720" y="868" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Classical solvers</text>
    <text x="720" y="884" text-anchor="middle" font-size="10" fill="#0F6E56">Open source: HiGHS · OR-Tools</text>
    <text x="720" y="898" text-anchor="middle" font-size="10" fill="#0F6E56">Commercial: Gurobi · FICO · CPLEX</text>
    <text x="720" y="916" text-anchor="middle" font-size="10" font-style="italic" fill="#085041">Both tiers · swappable via contracts</text>
  </g>

  <g opacity="0.55">
    <rect x="880" y="844" width="240" height="84" rx="8" fill="#FAEEDA" stroke="#633806" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="1000" y="868" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Graph databases</text>
    <text x="1000" y="884" text-anchor="middle" font-size="10" fill="#854F0B">Neo4j · Kuzu · Memgraph</text>
    <text x="1000" y="916" text-anchor="middle" font-size="10" font-style="italic" fill="#633806">Alternative · not chosen</text>
  </g>

  <line x1="60" y1="954" x2="1140" y2="954" stroke="#ede9dc" stroke-width="1"/>

  <!-- Connectors compute -> foundation -->
  <line x1="180" y1="928" x2="340" y2="992" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="440" y1="928" x2="600" y2="992" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>
  <line x1="720" y1="928" x2="900" y2="992" stroke="#bdbbb2" stroke-width="1" marker-end="url(#vc-arrow)"/>

  <!-- Band 6: Foundation layer -->
  <g>
    <rect x="220" y="998" width="240" height="62" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1.5"/>
    <text x="340" y="1022" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">H3 spatial index</text>
    <text x="340" y="1040" text-anchor="middle" font-size="10" fill="#5F5E5A">Hierarchical hexagons · h3o Rust crate</text>
  </g>

  <g>
    <rect x="480" y="980" width="320" height="82" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="2"/>
    <text x="640" y="1002" text-anchor="middle" font-size="14" font-weight="700" fill="#2C2C2A">Geospatial data sources</text>
    <text x="640" y="1018" text-anchor="middle" font-size="10" fill="#444441">OpenStreetMap · Overture Maps · Maxar</text>
    <text x="640" y="1032" text-anchor="middle" font-size="10" fill="#444441">Planet · ESA Sentinel · national open registries</text>
    <text x="640" y="1052" text-anchor="middle" font-size="10" font-style="italic" fill="#2C2C2A">Multi-source · global coverage</text>
  </g>

  <g>
    <rect x="820" y="998" width="240" height="62" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1.5"/>
    <text x="940" y="1022" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Cloud compute</text>
    <text x="940" y="1040" text-anchor="middle" font-size="10" fill="#5F5E5A">Multi-cloud: AWS · GCP · Azure</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="150" height="312" rx="6" fill="#ffffff" stroke="#d3d1c7" stroke-width="1"/>

    <text x="10" y="20" font-size="12" font-weight="600" fill="#2C2C2A">Sourcing</text>
    <rect x="10" y="32" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#3C3489" stroke-width="1.2"/>
    <text x="30" y="44" font-size="10" fill="#444441">Custom build</text>
    <rect x="10" y="54" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#085041" stroke-width="1.2"/>
    <text x="30" y="66" font-size="10" fill="#444441">Open source</text>
    <rect x="10" y="76" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#633806" stroke-width="1.2"/>
    <text x="30" y="88" font-size="10" fill="#444441">Commercial product</text>
    <rect x="10" y="98" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1.2"/>
    <text x="30" y="110" font-size="10" fill="#444441">Commodity utility</text>

    <line x1="10" y1="128" x2="140" y2="128" stroke="#ede9dc" stroke-width="1"/>
    <text x="10" y="146" font-size="12" font-weight="600" fill="#2C2C2A">Strategic markers</text>

    <circle cx="17" cy="166" r="8" fill="none" stroke="#D4860A" stroke-width="1.8" stroke-dasharray="3 2"/>
    <text x="30" y="170" font-size="10" fill="#444441">The moat</text>

    <polygon points="17,182 24,189 17,196 10,189" fill="#0F8B5C" stroke="#06432B" stroke-width="0.8"/>
    <text x="30" y="192" font-size="10" fill="#444441">Open-source target</text>

    <polygon points="17,206 19,213 26,213 21,217 23,224 17,220 11,224 13,217 8,213 15,213" fill="#7B2CBF" stroke="#3C1A66" stroke-width="0.6"/>
    <text x="30" y="218" font-size="10" fill="#444441">Primary research bet</text>

    <polygon points="17,232 19,239 26,239 21,243 23,250 17,246 11,250 13,243 8,239 15,239" fill="#FFFFFF" stroke="#7B2CBF" stroke-width="1.2"/>
    <text x="30" y="244" font-size="10" fill="#444441">Compounding research bet</text>

    <g stroke="#A32D2D" stroke-width="2" stroke-linecap="round">
      <line x1="11" y1="258" x2="23" y2="270"/>
      <line x1="23" y1="258" x2="11" y2="270"/>
    </g>
    <text x="30" y="268" font-size="10" fill="#444441">Deliberate inertia</text>

    <line x1="10" y1="284" x2="140" y2="284" stroke="#ede9dc" stroke-width="1"/>
    <text x="10" y="300" font-size="9" font-style="italic" fill="#888780">P-numbers reference</text>
    <text x="10" y="310" font-size="9" font-style="italic" fill="#888780">architecture principles</text>
  </g>
</svg>
