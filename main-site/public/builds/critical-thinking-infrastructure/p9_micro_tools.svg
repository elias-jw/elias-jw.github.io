<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .lane-name { font-size: 11px; fill: #222; font-weight: 600; }
    .lane-sub { font-size: 9px; fill: #888; }
    .tool-title { font-size: 10px; fill: #222; font-weight: 600; }
    .tool-sub { font-size: 9px; fill: #888; }
    .note { font-size: 9px; fill: #333; }
    .forbid-item { font-size: 9px; fill: #d84315; }
    .belongs { font-size: 8px; fill: #888; font-style: italic; }
    .lane-box { fill: #fafafa; stroke: #333; stroke-width: 1; }
    .tool-box { fill: #fff; stroke: #333; stroke-width: 1; }
    .forbid-box { fill: #fff; stroke: #d84315; stroke-width: 1; stroke-dasharray: 3 2; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .arrow { stroke: #555; stroke-width: 1; fill: none; marker-end: url(#a9); }
    .strike { stroke: #d84315; stroke-width: 1.5; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
  </style>
  <defs>
    <marker id="a9" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#555" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">P9. micro-tools compose freely, embed nothing</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">read-only by default. any logic that belongs elsewhere goes elsewhere.</text>

  <!-- ============ LEFT LANE: allowed composition ============ -->
  <rect x="40" y="58" width="310" height="296" rx="4" class="lane-box"/>
  <text class="lane-name" x="54" y="78">allowed: composition</text>
  <text class="lane-sub" x="54" y="91">read, combine, render, discard</text>

  <rect x="90" y="106" width="210" height="36" rx="3" class="tool-box"/>
  <text class="tool-title" x="195" y="122" text-anchor="middle">spatial_filter</text>
  <text class="tool-sub" x="195" y="134" text-anchor="middle">reads graph; returns H3 cell set</text>

  <line x1="195" y1="142" x2="195" y2="158" class="arrow"/>

  <rect x="90" y="160" width="210" height="36" rx="3" class="tool-box"/>
  <text class="tool-title" x="195" y="176" text-anchor="middle">coverage_heatmap</text>
  <text class="tool-sub" x="195" y="188" text-anchor="middle">reads filter output + solver result</text>

  <line x1="195" y1="196" x2="195" y2="212" class="arrow"/>

  <rect x="90" y="214" width="210" height="36" rx="3" class="tool-box"/>
  <text class="tool-title" x="195" y="230" text-anchor="middle">scenario_diff</text>
  <text class="tool-sub" x="195" y="242" text-anchor="middle">composes two heatmaps side by side</text>

  <line x1="195" y1="250" x2="195" y2="266" class="arrow"/>

  <rect x="90" y="268" width="210" height="36" rx="3" class="tool-box"/>
  <text class="tool-title" x="195" y="284" text-anchor="middle">render / discard</text>
  <text class="tool-sub" x="195" y="296" text-anchor="middle">nothing written to the graph</text>

  <text class="note" x="195" y="328" text-anchor="middle">built in minutes. redundancy here</text>
  <text class="note" x="195" y="340" text-anchor="middle">is cheaper than shared complexity.</text>

  <!-- ============ RIGHT LANE: forbidden embedding ============ -->
  <rect x="370" y="58" width="290" height="296" rx="4" class="lane-box"/>
  <text class="lane-name" x="384" y="78">forbidden: embedded logic</text>
  <text class="lane-sub" x="384" y="91">belongs in a lower layer, not the tool</text>

  <rect x="390" y="108" width="250" height="62" rx="3" class="forbid-box"/>
  <text class="forbid-item" x="402" y="126">• address normalisation rules</text>
  <line x1="402" y1="122" x2="596" y2="122" class="strike"/>
  <text class="belongs" x="402" y="140">belongs in: ontology (P4)</text>
  <text class="forbid-item" x="402" y="156">• Vehicle / Route type definitions</text>
  <line x1="402" y1="152" x2="612" y2="152" class="strike"/>

  <rect x="390" y="180" width="250" height="62" rx="3" class="forbid-box"/>
  <text class="forbid-item" x="402" y="198">• reusable Haversine implementation</text>
  <line x1="402" y1="194" x2="626" y2="194" class="strike"/>
  <text class="belongs" x="402" y="212">belongs in: compute adapter (P6/P7)</text>
  <text class="forbid-item" x="402" y="228">• custom solver glue code</text>
  <line x1="402" y1="224" x2="568" y2="224" class="strike"/>

  <rect x="390" y="252" width="250" height="62" rx="3" class="forbid-box"/>
  <text class="forbid-item" x="402" y="270">• direct graph writes</text>
  <line x1="402" y1="266" x2="532" y2="266" class="strike"/>
  <text class="belongs" x="402" y="284">belongs in: engine + ontology validation</text>
  <text class="forbid-item" x="402" y="300">• bypassing idempotency checks</text>
  <line x1="402" y1="296" x2="594" y2="296" class="strike"/>

  <text class="note" x="515" y="336" text-anchor="middle">when reuse appears, promote (P8).</text>

  <line x1="40" y1="372" x2="660" y2="372" class="divider"/>
  <text class="caption" x="40" y="390">the N×M problem is allowed here because its cost is minimal. the prohibition keeps it contained.</text>
</svg>
