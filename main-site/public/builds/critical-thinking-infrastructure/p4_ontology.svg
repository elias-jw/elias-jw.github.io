<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .engine { font-size: 11px; fill: #222; font-weight: 600; }
    .engine-sub { font-size: 9px; fill: #888; }
    .ont-name { font-size: 10px; fill: #d84315; font-weight: 600; }
    .ont-sub { font-size: 9px; fill: #888; }
    .prop { font-size: 9px; fill: #333; }
    .engine-box { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .ont-box { fill: #fff; stroke: #d84315; stroke-width: 1; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .arrow { stroke: #555; stroke-width: 1; fill: none; marker-end: url(#a4); }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .label { font-size: 9px; fill: #888; font-style: italic; }
  </style>
  <defs>
    <marker id="a4" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#555" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">P4. domain lives in the ontology, not the engine</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">one engine, many domains. a new problem is authoring work, not engineering work.</text>

  <!-- Engine (centre) -->
  <rect x="260" y="156" width="180" height="100" rx="4" class="engine-box"/>
  <text class="engine" x="350" y="180" text-anchor="middle">graph engine</text>
  <text class="engine-sub" x="350" y="196" text-anchor="middle">structural primitives only</text>
  <line x1="278" y1="206" x2="422" y2="206" class="divider"/>
  <text class="prop" x="290" y="222">• generic nodes</text>
  <text class="prop" x="290" y="236">• typed edges</text>
  <text class="prop" x="290" y="250">• temporal intervals</text>

  <text class="label" x="350" y="280" text-anchor="middle">knows nothing about vehicles,</text>
  <text class="label" x="350" y="292" text-anchor="middle">routes, orders, or depots</text>

  <!-- Ontology A (top left) -->
  <rect x="40" y="70" width="180" height="80" rx="3" class="ont-box"/>
  <text class="ont-name" x="130" y="90" text-anchor="middle">urban_logistics.toml</text>
  <text class="ont-sub" x="130" y="104" text-anchor="middle">Vehicle, Depot, Route,</text>
  <text class="ont-sub" x="130" y="116" text-anchor="middle">DemandPoint, LEZ</text>
  <text class="ont-sub" x="130" y="136" text-anchor="middle" font-style="italic">Singapore deployment</text>

  <!-- Ontology B (top right) -->
  <rect x="480" y="70" width="180" height="80" rx="3" class="ont-box"/>
  <text class="ont-name" x="570" y="90" text-anchor="middle">cold_chain.toml</text>
  <text class="ont-sub" x="570" y="104" text-anchor="middle">Shipment, TempZone,</text>
  <text class="ont-sub" x="570" y="116" text-anchor="middle">Batch, ExpiryWindow</text>
  <text class="ont-sub" x="570" y="136" text-anchor="middle" font-style="italic">pharma deployment</text>

  <!-- Ontology C (bottom) -->
  <rect x="260" y="294" width="180" height="60" rx="3" class="ont-box"/>
  <text class="ont-name" x="350" y="314" text-anchor="middle">port_ops.toml</text>
  <text class="ont-sub" x="350" y="328" text-anchor="middle">Berth, Crane, Container,</text>
  <text class="ont-sub" x="350" y="340" text-anchor="middle">VesselCall</text>

  <!-- Arrows -->
  <path d="M220,130 C240,150 250,160 262,170" class="arrow"/>
  <path d="M480,130 C460,150 450,160 438,170" class="arrow"/>
  <path d="M350,294 L350,258" class="arrow"/>

  <line x1="40" y1="366" x2="660" y2="366" class="divider"/>
</svg>
