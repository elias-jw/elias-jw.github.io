<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .col-head { font-size: 11px; fill: #222; font-weight: 600; }
    .col-sub { font-size: 9px; fill: #888; }
    .row-label { font-size: 10px; fill: #555; }
    .yes { font-size: 10px; fill: #2e7d32; font-weight: 600; }
    .no { font-size: 10px; fill: #d84315; font-weight: 600; }
    .col-stated { fill: #f5f5f5; stroke: #666; stroke-width: 1; }
    .col-revealed { fill: #fff; stroke: #d84315; stroke-width: 1; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .src-pill { fill: #fff; stroke: #aaa; stroke-width: 0.6; }
    .src { font-size: 8px; fill: #888; }
  </style>

  <text class="title" x="350" y="22" text-anchor="middle">Stated values and revealed values</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">what a structured questionnaire captures vs what operational and public communication captures</text>

  <!-- ===== Column boxes ===== -->
  <rect x="240" y="56" width="180" height="282" rx="3" class="col-stated"/>
  <rect x="440" y="56" width="220" height="282" rx="3" class="col-revealed"/>

  <!-- Column headers -->
  <text class="col-head" x="330" y="78" text-anchor="middle">stated</text>
  <text class="col-sub" x="330" y="92" text-anchor="middle">structured elicitation</text>

  <text class="col-head" x="550" y="78" text-anchor="middle" fill="#d84315">revealed</text>
  <text class="col-sub" x="550" y="92" text-anchor="middle">operational + public communication</text>

  <!-- Source pills under each header -->
  <rect x="262" y="100" width="60" height="16" rx="2" class="src-pill"/>
  <text class="src" x="292" y="111" text-anchor="middle">survey</text>
  <rect x="328" y="100" width="76" height="16" rx="2" class="src-pill"/>
  <text class="src" x="366" y="111" text-anchor="middle">questionnaire</text>

  <rect x="455" y="100" width="60" height="16" rx="2" class="src-pill"/>
  <text class="src" x="485" y="111" text-anchor="middle">email</text>
  <rect x="520" y="100" width="50" height="16" rx="2" class="src-pill"/>
  <text class="src" x="545" y="111" text-anchor="middle">slack</text>
  <rect x="575" y="100" width="70" height="16" rx="2" class="src-pill"/>
  <text class="src" x="610" y="111" text-anchor="middle">public posts</text>

  <!-- ===== Property rows ===== -->
  <line x1="40" y1="132" x2="660" y2="132" class="divider"/>

  <!-- Row 1: behavioural -->
  <text class="row-label" x="50" y="156">behavioural (does work)</text>
  <text class="no" x="330" y="156" text-anchor="middle">no</text>
  <text class="yes" x="550" y="156" text-anchor="middle">yes</text>

  <line x1="40" y1="170" x2="660" y2="170" class="divider"/>

  <!-- Row 2: longitudinal -->
  <text class="row-label" x="50" y="194">longitudinal (over years)</text>
  <text class="no" x="330" y="194" text-anchor="middle">no</text>
  <text class="yes" x="550" y="194" text-anchor="middle">yes</text>

  <line x1="40" y1="208" x2="660" y2="208" class="divider"/>

  <!-- Row 3: tracks event response -->
  <text class="row-label" x="50" y="232">tracks event response</text>
  <text class="no" x="330" y="232" text-anchor="middle">no</text>
  <text class="yes" x="550" y="232" text-anchor="middle">yes</text>

  <line x1="40" y1="246" x2="660" y2="246" class="divider"/>

  <!-- Row 4: avoids social desirability -->
  <text class="row-label" x="50" y="270">avoids desirability bias</text>
  <text class="no" x="330" y="270" text-anchor="middle">no</text>
  <text class="yes" x="550" y="270" text-anchor="middle">yes</text>

  <line x1="40" y1="284" x2="660" y2="284" class="divider"/>

  <!-- Row 5: relies on introspection -->
  <text class="row-label" x="50" y="308">relies on introspection</text>
  <text class="no" x="330" y="308" text-anchor="middle">yes</text>
  <text class="yes" x="550" y="308" text-anchor="middle">no</text>

  <line x1="40" y1="322" x2="660" y2="322" class="divider"/>

  <!-- Footer caption -->
  <text class="caption" x="40" y="362">people are not reliable introspectors of their own decision criteria; what they do under pressure is.</text>
  <text class="src" x="40" y="378">Samuelson 1938; Beshears, Choi, Laibson, Madrian 2008; Diamond &amp; Hausman 1994.</text>
</svg>
