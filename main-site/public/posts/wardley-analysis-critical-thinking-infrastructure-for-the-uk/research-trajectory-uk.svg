<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="phaseArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <linearGradient id="gradV0" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="gradV1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="gradV2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="780" fill="#FAFAFA"/>

  <text x="700" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Research trajectory — from validated practice to UK decision commons</text>
  <text x="700" y="62" text-anchor="middle" font-size="13" fill="#6B7280">Three horizons: what is tested · what is being built with UK research partners · what becomes public infrastructure</text>

  <!-- Phase headers -->
  <rect x="60" y="100" width="420" height="56" fill="url(#gradV0)" stroke="#1E40AF" stroke-width="2" rx="6"/>
  <text x="270" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A8A">v0 — Urban logistics</text>
  <text x="270" y="146" text-anchor="middle" font-size="11" fill="#1E40AF" font-style="italic">2020–2026 · validated in commercial deployments</text>

  <rect x="490" y="100" width="420" height="56" fill="url(#gradV1)" stroke="#047857" stroke-width="2" rx="6"/>
  <text x="700" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#064E3B">v1 — Open substrate + AI facilitator</text>
  <text x="700" y="146" text-anchor="middle" font-size="11" fill="#047857" font-style="italic">2026–2028 · UK research partnership window</text>

  <rect x="920" y="100" width="420" height="56" fill="url(#gradV2)" stroke="#B45309" stroke-width="2" rx="6"/>
  <text x="1130" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#78350F">v2 — UK decision commons</text>
  <text x="1130" y="146" text-anchor="middle" font-size="11" fill="#92400E" font-style="italic">2028+ · public infrastructure horizon</text>

  <line x1="480" y1="128" x2="488" y2="128" stroke="#374151" stroke-width="2.5" marker-end="url(#phaseArrow)"/>
  <line x1="910" y1="128" x2="918" y2="128" stroke="#374151" stroke-width="2.5" marker-end="url(#phaseArrow)"/>

  <!-- SCOPE row -->
  <text x="60" y="190" font-size="11" font-weight="700" fill="#6B7280">SCOPE</text>

  <rect x="60" y="200" width="420" height="70" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="75" y="222" font-size="12" font-weight="600" fill="#111827">Single city · single organisation</text>
  <text x="75" y="240" font-size="11" fill="#374151">Bespoke implementations · human facilitator in the room</text>
  <text x="75" y="258" font-size="11" fill="#374151">Decisions worth tens to hundreds of millions per engagement</text>

  <rect x="490" y="200" width="420" height="70" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="505" y="222" font-size="12" font-weight="600" fill="#111827">First UK city · multiple organisations · UK partners</text>
  <text x="505" y="240" font-size="11" fill="#374151">Spatial substrate built once · AI facilitator with human fallback</text>
  <text x="505" y="258" font-size="11" fill="#374151">Extends upstream: movement → production → procurement</text>

  <rect x="920" y="200" width="420" height="70" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>
  <text x="935" y="222" font-size="12" font-weight="600" fill="#111827">UK-wide federated commons · cross-sector adoption</text>
  <text x="935" y="240" font-size="11" fill="#374151">Decision-trace dataset · anonymised · consented</text>
  <text x="935" y="258" font-size="11" fill="#374151">Research instrument for collective decision-making</text>

  <!-- ARCHITECTURE LAYERS row -->
  <text x="60" y="300" font-size="11" font-weight="700" fill="#6B7280">ARCHITECTURE LIVE AT THIS PHASE</text>

  <!-- v0 architecture -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="420" height="190" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>
    <rect x="14" y="14" width="392" height="28" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1" rx="3"/>
    <text x="210" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#1E3A8A">Micro-tools · bespoke per project</text>

    <rect x="14" y="48" width="392" height="28" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1" rx="3"/>
    <text x="210" y="67" text-anchor="middle" font-size="11" font-weight="600" fill="#1E3A8A">Solver adapters · custom glue each time</text>

    <rect x="14" y="82" width="392" height="28" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="210" y="101" text-anchor="middle" font-size="11" font-style="italic" fill="#6B7280">Ontology framework · implicit, in facilitator's head</text>

    <rect x="14" y="116" width="392" height="28" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="210" y="135" text-anchor="middle" font-size="11" font-style="italic" fill="#6B7280">Spatial KG · rebuilt per project</text>

    <rect x="14" y="150" width="392" height="28" fill="#E0E7FF" stroke="#4338CA" stroke-width="1" rx="3"/>
    <text x="210" y="169" text-anchor="middle" font-size="11" font-weight="600" fill="#3730A3">Human facilitator (scarce, expensive)</text>
  </g>

  <!-- v1 architecture -->
  <g transform="translate(490, 310)">
    <rect x="0" y="0" width="420" height="190" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>

    <rect x="14" y="14" width="392" height="28" fill="#D1FAE5" stroke="#047857" stroke-width="1" rx="3"/>
    <text x="210" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#064E3B">Micro-tools · composable framework</text>

    <rect x="14" y="48" width="392" height="28" fill="#D1FAE5" stroke="#047857" stroke-width="1" rx="3"/>
    <text x="210" y="67" text-anchor="middle" font-size="11" font-weight="600" fill="#064E3B">Solver contracts · HiGHS-first · OR-Tools alongside</text>

    <rect x="14" y="82" width="392" height="28" fill="#D1FAE5" stroke="#047857" stroke-width="1" rx="3"/>
    <text x="210" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#064E3B">Ontology framework · declarative, runtime-loaded</text>

    <rect x="14" y="116" width="392" height="28" fill="#D1FAE5" stroke="#047857" stroke-width="1" rx="3"/>
    <text x="210" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#064E3B">★ Spatial KG · built once, OGL release for first UK city</text>

    <rect x="14" y="150" width="392" height="28" fill="#A7F3D0" stroke="#065F46" stroke-width="1.5" rx="3"/>
    <text x="210" y="169" text-anchor="middle" font-size="11" font-weight="700" fill="#064E3B">AI facilitator (with human fallback)</text>
  </g>

  <!-- v2 architecture -->
  <g transform="translate(920, 310)">
    <rect x="0" y="0" width="420" height="190" fill="white" stroke="#CBD5E1" stroke-width="1" rx="4"/>

    <rect x="14" y="14" width="392" height="28" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="3"/>
    <text x="210" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Micro-tools + community contributions</text>

    <rect x="14" y="48" width="392" height="28" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="3"/>
    <text x="210" y="67" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Solver contracts + social framing layer</text>

    <rect x="14" y="82" width="392" height="28" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="3"/>
    <text x="210" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Shared ontologies · multi-domain · versioned</text>

    <rect x="14" y="116" width="392" height="28" fill="#FDE68A" stroke="#92400E" stroke-width="1.5" rx="3"/>
    <text x="210" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">★ Federated spatial KG · UK-wide public substrate</text>

    <rect x="14" y="150" width="392" height="28" fill="#FDE68A" stroke="#92400E" stroke-width="1.5" rx="3"/>
    <text x="210" y="169" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">AI facilitator trained on consented decision traces</text>
  </g>

  <!-- THE BET row -->
  <text x="60" y="530" font-size="11" font-weight="700" fill="#6B7280">THE BET · WHAT MUST BE TRUE</text>

  <rect x="60" y="540" width="420" height="90" fill="white" stroke="#1E40AF" stroke-width="1.5" rx="4"/>
  <text x="75" y="562" font-size="12" font-weight="700" fill="#1E3A8A">Validated ✓</text>
  <text x="75" y="582" font-size="11" fill="#374151">Explore-decide loop outperforms traditional workflow</text>
  <text x="75" y="598" font-size="11" fill="#374151">Scenario comparison changes how planners think</text>
  <text x="75" y="614" font-size="11" fill="#374151">Human facilitator is the compression bottleneck</text>

  <rect x="490" y="540" width="420" height="90" fill="white" stroke="#047857" stroke-width="1.5" rx="4"/>
  <text x="505" y="562" font-size="12" font-weight="700" fill="#064E3B">Research risk ⚠</text>
  <text x="505" y="582" font-size="11" fill="#374151">LLM can translate natural language into graph queries reliably</text>
  <text x="505" y="598" font-size="11" fill="#374151">Ontology framework works as configuration, not code</text>
  <text x="505" y="614" font-size="11" fill="#374151">Substrate amortises: tenth project costs much less than first</text>

  <rect x="920" y="540" width="420" height="90" fill="white" stroke="#B45309" stroke-width="1.5" rx="4"/>
  <text x="935" y="562" font-size="12" font-weight="700" fill="#92400E">Institutional risk ⚠⚠</text>
  <text x="935" y="582" font-size="11" fill="#374151">Public release under OGL is supported by funding partners</text>
  <text x="935" y="598" font-size="11" fill="#374151">Organisations share consented anonymised traces</text>
  <text x="935" y="614" font-size="11" fill="#374151">Decision traces are actually inspected by the collective</text>

  <!-- FUNDING MODEL row -->
  <text x="60" y="660" font-size="11" font-weight="700" fill="#6B7280">FUNDING MODEL</text>

  <rect x="60" y="670" width="420" height="38" fill="#1E40AF" rx="4"/>
  <text x="270" y="694" text-anchor="middle" font-size="13" font-weight="700" fill="white">Commercial engagements</text>

  <rect x="490" y="670" width="420" height="38" fill="#047857" rx="4"/>
  <text x="700" y="694" text-anchor="middle" font-size="13" font-weight="700" fill="white">Mixed: commercial + ARIA · UKRI · Innovate UK · Turing</text>

  <rect x="920" y="670" width="420" height="38" fill="#B45309" rx="4"/>
  <text x="1130" y="694" text-anchor="middle" font-size="13" font-weight="700" fill="white">Co-funded public infrastructure · OGL release</text>

  <!-- Footer -->
  <text x="700" y="745" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">
    The architecture is stable across all three phases. The funding model, the geographies covered, and the data flowing through it are what evolve.
  </text>
  <text x="700" y="762" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">
    Each phase de-risks the next; the public substrate compounds rather than resets.
  </text>
</svg>
