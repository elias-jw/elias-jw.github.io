<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .layer-name { font-size: 11px; fill: #222; font-weight: 600; }
    .layer-sub { font-size: 9px; fill: #888; }
    .label { font-size: 10px; fill: #333; }
    .sub { font-size: 9px; fill: #888; }
    .pill { fill: #fff; stroke: #333; stroke-width: 1; }
    .pill-accent { fill: #fff; stroke: #d84315; stroke-width: 1; }
    .pill-classical { fill: #f5f5f5; stroke: #666; stroke-width: 1; }
    .layer-box { fill: #fafafa; stroke: #333; stroke-width: 1; }
    .caption { font-size: 9px; fill: #d84315; font-style: italic; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
  </style>
  <defs>
    <marker id="awal" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">Where AI lives in the architecture</text>
  <text class="sub" x="350" y="36" text-anchor="middle">a different model class at each layer, all attached to a stable substrate</text>

  <!-- ============ LAYER 4: Facilitator ============ -->
  <rect x="40" y="56" width="620" height="68" class="layer-box"/>
  <text class="layer-name" x="54" y="74">Layer 4: Facilitator</text>
  <text class="layer-sub" x="54" y="86">translation: question → query plan</text>

  <rect x="260" y="92" width="160" height="22" rx="3" class="pill-accent"/>
  <text class="label" x="340" y="107" text-anchor="middle" fill="#d84315">general-purpose LLM</text>

  <rect x="430" y="92" width="200" height="22" rx="3" class="pill-accent"/>
  <text class="label" x="530" y="107" text-anchor="middle" fill="#d84315">small domain-tuned LLM</text>

  <line x1="350" y1="124" x2="350" y2="138" stroke="#333" stroke-width="1" marker-end="url(#awal)"/>

  <!-- ============ LAYER 3: Solver integration ============ -->
  <rect x="40" y="142" width="620" height="68" class="layer-box"/>
  <text class="layer-name" x="54" y="160">Layer 3: Solver integration</text>
  <text class="layer-sub" x="54" y="172">structured problems, known structure to exploit</text>

  <rect x="260" y="178" width="100" height="22" rx="3" class="pill-classical"/>
  <text class="label" x="310" y="193" text-anchor="middle">MIP</text>

  <rect x="365" y="178" width="100" height="22" rx="3" class="pill-classical"/>
  <text class="label" x="415" y="193" text-anchor="middle">combinatorial</text>

  <rect x="470" y="178" width="80" height="22" rx="3" class="pill-classical"/>
  <text class="label" x="510" y="193" text-anchor="middle">net-flow</text>

  <rect x="555" y="178" width="80" height="22" rx="3" class="pill-classical"/>
  <text class="label" x="595" y="193" text-anchor="middle">CSP</text>

  <text class="sub" x="54" y="194">classical methods</text>
  <text class="sub" x="54" y="204">+ RL for heuristic selection</text>

  <line x1="350" y1="210" x2="350" y2="224" stroke="#333" stroke-width="1" marker-end="url(#awal)"/>

  <!-- ============ LAYER 2: Domain graph ============ -->
  <rect x="40" y="228" width="620" height="68" class="layer-box"/>
  <text class="layer-name" x="54" y="246">Layer 2: Domain graph</text>
  <text class="layer-sub" x="54" y="258">graph-structured data, the operational problem</text>

  <rect x="260" y="264" width="110" height="22" rx="3" class="pill"/>
  <text class="label" x="315" y="279" text-anchor="middle">GNNs</text>

  <rect x="375" y="264" width="125" height="22" rx="3" class="pill"/>
  <text class="label" x="437" y="279" text-anchor="middle">time series</text>

  <rect x="505" y="264" width="125" height="22" rx="3" class="pill"/>
  <text class="label" x="567" y="279" text-anchor="middle">causal ML</text>

  <line x1="350" y1="296" x2="350" y2="310" stroke="#333" stroke-width="1" marker-end="url(#awal)"/>

  <!-- ============ LAYER 1: Spatial knowledge graph ============ -->
  <rect x="40" y="314" width="620" height="68" class="layer-box"/>
  <text class="layer-name" x="54" y="332">Layer 1: Spatial knowledge graph</text>
  <text class="layer-sub" x="54" y="344">construction and maintenance of the stable substrate</text>

  <rect x="260" y="350" width="110" height="22" rx="3" class="pill"/>
  <text class="label" x="315" y="365" text-anchor="middle">LLM extract</text>

  <rect x="375" y="350" width="125" height="22" rx="3" class="pill"/>
  <text class="label" x="437" y="365" text-anchor="middle">CV footprints</text>

  <rect x="505" y="350" width="125" height="22" rx="3" class="pill"/>
  <text class="label" x="567" y="365" text-anchor="middle">entity resolution</text>

  <!-- Footer caption -->
  <line x1="40" y1="402" x2="660" y2="402" class="divider"/>
  <text class="caption" x="40" y="420">no single model spans all four. each is best-of-class for the sub-problem in its layer.</text>
  <text class="sub" x="40" y="436">classical methods sit alongside neural ones; the architecture stays the same when any model is swapped.</text>
</svg>
