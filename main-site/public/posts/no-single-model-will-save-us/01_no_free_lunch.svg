<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 13px; fill: #222; font-weight: 600; }
    .sub-title { font-size: 9px; fill: #888; }
    .era { font-size: 10px; fill: #888; }
    .tech { font-size: 11px; fill: #222; font-weight: 600; }
    .claim { font-size: 10px; fill: #333; }
    .reality { font-size: 10px; fill: #d84315; }
    .reality-sub { font-size: 9px; fill: #888; }
    .pill-claim { fill: #f5f5f5; stroke: #666; stroke-width: 1; }
    .pill-reality { fill: #fbe9e7; stroke: #d84315; stroke-width: 1; }
    .arrow { stroke: #333; stroke-width: 1; fill: none; marker-end: url(#anfl); }
    .col-head { font-size: 9px; fill: #888; font-weight: 600; }
    .divider { stroke: #ccc; stroke-width: 0.75; stroke-dasharray: 2 2; }
    .nfl-box { fill: #fff; stroke: #d84315; stroke-width: 1; }
  </style>
  <defs>
    <marker id="anfl" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="title" x="350" y="22" text-anchor="middle">Seventy years of universal solutions</text>
  <text class="sub-title" x="350" y="36" text-anchor="middle">each cycle: a new technology declared universal, then bounded by reality five to ten years later</text>

  <!-- Column headers -->
  <text class="col-head" x="50" y="62">era</text>
  <text class="col-head" x="120" y="62">technology</text>
  <text class="col-head" x="290" y="62">the claim</text>
  <text class="col-head" x="500" y="62">the correction</text>

  <line x1="40" y1="68" x2="660" y2="68" class="divider"/>

  <!-- Row 1: Newton -->
  <text class="era" x="50" y="92">1687</text>
  <text class="tech" x="120" y="92">classical mechanics</text>
  <rect x="270" y="78" width="200" height="22" rx="3" class="pill-claim"/>
  <text class="claim" x="370" y="93" text-anchor="middle">"predicts everything"</text>
  <line x1="470" y1="89" x2="488" y2="89" class="arrow"/>
  <rect x="490" y="78" width="170" height="22" rx="3" class="pill-reality"/>
  <text class="reality" x="575" y="93" text-anchor="middle">quantum + chaos</text>

  <!-- Row 2: Genetic algorithms -->
  <text class="era" x="50" y="128">1990s</text>
  <text class="tech" x="120" y="128">genetic algorithms</text>
  <rect x="270" y="114" width="200" height="22" rx="3" class="pill-claim"/>
  <text class="claim" x="370" y="129" text-anchor="middle">"optimises any function"</text>
  <line x1="470" y1="125" x2="488" y2="125" class="arrow"/>
  <rect x="490" y="114" width="170" height="22" rx="3" class="pill-reality"/>
  <text class="reality" x="575" y="129" text-anchor="middle">No Free Lunch (1997)</text>

  <!-- Row 3: Big data -->
  <text class="era" x="50" y="164">2000s</text>
  <text class="tech" x="120" y="164">big data + statistics</text>
  <rect x="270" y="150" width="200" height="22" rx="3" class="pill-claim"/>
  <text class="claim" x="370" y="165" text-anchor="middle">"the end of theory"</text>
  <line x1="470" y1="161" x2="488" y2="161" class="arrow"/>
  <rect x="490" y="150" width="170" height="22" rx="3" class="pill-reality"/>
  <text class="reality" x="575" y="165" text-anchor="middle">correlation ≠ causation</text>

  <!-- Row 4: Deep learning -->
  <text class="era" x="50" y="200">2010s</text>
  <text class="tech" x="120" y="200">deep learning</text>
  <rect x="270" y="186" width="200" height="22" rx="3" class="pill-claim"/>
  <text class="claim" x="370" y="201" text-anchor="middle">"learns any pattern"</text>
  <line x1="470" y1="197" x2="488" y2="197" class="arrow"/>
  <rect x="490" y="186" width="170" height="22" rx="3" class="pill-reality"/>
  <text class="reality" x="575" y="201" text-anchor="middle">brittle, no causal sense</text>

  <!-- Row 5: LLMs / scaling -->
  <text class="era" x="50" y="236">2020s</text>
  <text class="tech" x="120" y="236">scaling laws / LLMs</text>
  <rect x="270" y="222" width="200" height="22" rx="3" class="pill-claim"/>
  <text class="claim" x="370" y="237" text-anchor="middle">"scaling → AGI"</text>
  <line x1="470" y1="233" x2="488" y2="233" class="arrow"/>
  <rect x="490" y="222" width="170" height="22" rx="3" class="pill-reality"/>
  <text class="reality" x="575" y="237" text-anchor="middle">hallucination, redefined</text>

  <!-- Row 6: context windows -->
  <text class="era" x="50" y="272">2024</text>
  <text class="tech" x="120" y="272">million-token context</text>
  <rect x="270" y="258" width="200" height="22" rx="3" class="pill-claim"/>
  <text class="claim" x="370" y="273" text-anchor="middle">"memory closes the gap"</text>
  <line x1="470" y1="269" x2="488" y2="269" class="arrow"/>
  <rect x="490" y="258" width="170" height="22" rx="3" class="pill-reality"/>
  <text class="reality" x="575" y="273" text-anchor="middle">same failures, more tokens</text>

  <!-- Row 7: next ? -->
  <text class="era" x="50" y="308">202?</text>
  <text class="tech" x="120" y="308" fill="#888">the next one</text>
  <rect x="270" y="294" width="200" height="22" rx="3" class="pill-claim" stroke-dasharray="3 2"/>
  <text class="claim" x="370" y="309" text-anchor="middle" fill="#888">"this one is different"</text>
  <line x1="470" y1="305" x2="488" y2="305" class="arrow" stroke-dasharray="3 2"/>
  <rect x="490" y="294" width="170" height="22" rx="3" class="pill-reality" stroke-dasharray="3 2" fill="#fff"/>
  <text class="reality" x="575" y="309" text-anchor="middle">5 to 10 years later</text>

  <!-- NFL takeaway box -->
  <line x1="40" y1="338" x2="660" y2="338" class="divider"/>
  <rect x="40" y="352" width="620" height="50" rx="3" class="nfl-box"/>
  <text class="tech" x="60" y="372" fill="#d84315">No Free Lunch (Wolpert &amp; Macready, 1997)</text>
  <text class="claim" x="60" y="388">elevated performance on one class of problems <tspan fill="#d84315">is exactly offset</tspan> by degraded performance on another.</text>
</svg>
