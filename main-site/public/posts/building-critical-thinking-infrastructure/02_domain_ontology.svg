<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Fira Code', 'Courier New', monospace; }
    .title { font-size: 12px; fill: #222; font-weight: 600; }
    .cell { font-size: 7px; fill: #555; }
    .cell-head { font-size: 7px; fill: #333; font-weight: 600; }
    .vsym { font-size: 11px; fill: #fff; font-weight: 600; font-style: italic; }
    .esym { font-size: 8px; fill: #666; font-style: italic; }
    .legend-sym { font-size: 9px; fill: #333; font-style: italic; }
    .legend-val { font-size: 9px; fill: #888; }
    .attr { font-size: 7.5px; fill: #aaa; }
    .sub { font-size: 9px; fill: #aaa; }
    .arrow-label { font-size: 9px; fill: #d84315; font-weight: 500; }
  </style>
  <defs>
    <marker id="aont" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#d84315" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="ae" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <text class="title" x="350" y="20" text-anchor="middle">Domain Ontology: from jargon to structure</text>

