  <g transform="translate(42, 308) rotate(-2)">
    <rect width="86" height="36" rx="1" fill="#fff9c4" stroke="#e6d54a" stroke-width="0.5"/>
    <text class="cell" x="8" y="14" style="fill:#777;">is "account" =</text>
    <text class="cell" x="8" y="26" style="fill:#777;">"customer"??</text>
  </g>

  <!-- ============ ARROW ============ -->
  <line x1="268" y1="196" x2="348" y2="196" stroke="#d84315" stroke-width="1.5" marker-end="url(#aont)"/>
  <text class="arrow-label" x="308" y="186" text-anchor="middle">ontology</text>

  <!-- ============ RIGHT SIDE: graph with symbolic labels ============ -->

  <!--
    Nodes (r=18):
      v1: 410, 72    (purple)
      v2: 545, 140   (orange)
      v3: 410, 218   (green)
      v4: 645, 248   (blue)
      v5: 530, 336   (amber)

    Edges computed perpendicular to circle:
      e1: v1→v2  d=(135,68) len=151  start=(426,81) end=(529,132)
      e2: v2→v3  d=(-135,78) len=156  start=(529,149) end=(426,209)
      e3: v2→v4  d=(100,108) len=147  start=(557,153) end=(633,235)
      e4: v3→v5  d=(120,118) len=168  start=(423,231) end=(517,323)
  -->

  <!-- Edges first -->
  <line x1="426" y1="81" x2="529" y2="132" stroke="#bbb" stroke-width="1" marker-end="url(#ae)"/>
  <text class="esym" x="488" y="98">e₁</text>

  <line x1="529" y1="149" x2="426" y2="209" stroke="#bbb" stroke-width="1" marker-end="url(#ae)"/>
  <text class="esym" x="466" y="174">e₂</text>

  <line x1="557" y1="153" x2="633" y2="235" stroke="#bbb" stroke-width="1" marker-end="url(#ae)"/>
  <text class="esym" x="606" y="188">e₃</text>

  <line x1="423" y1="231" x2="517" y2="323" stroke="#bbb" stroke-width="1" marker-end="url(#ae)"/>
  <text class="esym" x="454" y="282">e₄</text>

  <!-- Nodes on top -->
  <circle cx="410" cy="72" r="18" fill="#7b1fa2" stroke="#333" stroke-width="0.75"/>
  <text class="vsym" x="410" y="77" text-anchor="middle">v₁</text>

  <circle cx="545" cy="140" r="18" fill="#d84315" stroke="#333" stroke-width="0.75"/>
  <text class="vsym" x="545" y="145" text-anchor="middle">v₂</text>

  <circle cx="410" cy="218" r="18" fill="#2e7d32" stroke="#333" stroke-width="0.75"/>
  <text class="vsym" x="410" y="223" text-anchor="middle">v₃</text>

  <circle cx="645" cy="248" r="18" fill="#1565c0" stroke="#333" stroke-width="0.75"/>
